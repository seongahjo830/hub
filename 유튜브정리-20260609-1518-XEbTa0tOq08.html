# 🎬 AI시대, 창업 vs 취업? 현직 컨설턴트가 솔직하게 말해드림 
영상 보면서 같이 읽기 좋게 정리했어요 👇 (옵시디언에도 저장됨)

## 🎯 한눈에 요약
> - **현직 컨설턴트(김민할)와 대학생(조단, 연세대)**이 AI 시대에 창업 vs 취업을 솔직하게 토론하는 영상이에요.
> - 대학생 창업 열풍이 실제로 불고 있으며, 고려대는 창업 시 **무기한 휴학**까지 허용하는 정책을 내놨어요.
> - 창업에 잘 맞는 성향은 **자기주도적·목표지향적·네트워킹에 거리낌 없는** 사람이에요.
> - 창업의 최대 장점은 __상방이 무한한 사업소득__과 **압축 성장 경험**이지만, 리스크로는 금전·시간·심리적 고립감이 커요.
> - AI 시대에 1인 창업이 쉬워졌지만, 사업이 크려면 결국 사람이 필요하고 **팀 리스크**도 핵심 변수예요.
> - 결론: 사업을 거창하게 생각하지 말고 **작은 것부터 시작**하되, AC·컴퍼니빌더 등 지원 인프라를 적극 활용하라는 조언이에요.

## 🎙️ 출연자 소개 & 화제의 기사 [00:32]

- **김민할** — 현직 컨설턴트 (컨설팅 펌 약 10년 경력)
- **조단** — 연세대 재학 중, 첫 커리어로 컨설팅을 준비하면서도 궁극적으로 창업을 꿈꾸는 대학생

### 📰 고려대 "창업하면 무기한 휴학" 정책 [00:42]

- 최근 고려대에서 **학생이 창업할 경우 무기한 휴학을 허용**하겠다는 기사가 나와 큰 화제가 됐어요.
- 조단은 연세대 학생 입장에서 *"우리 학교도 이런 움직임이 필요하지 않을까"* 라며 부러움을 표현했어요.
- 예전에는 컨설팅이나 대기업 경력을 먼저 쌓고 창업하는 게 일반적이었는데, 지금은 **대학에서 바로(directly) 창업으로 가는 트렌드**로 바뀌고 있다는 것이 핵심 변화예요.

────────────────────────────

## 🔥 대학생 창업 열풍, 실제로 얼마나? [01:03]

- **정량적 지표보다 "사람이 모이느냐"가 체감 지표**라고 조단은 말해요.
  - 각 대학별로 __창업 동아리가 최소 하나씩은 존재__
  - 여러 대학이 **연합으로 만드는 창업 학회·동아리**도 활발
- 관심을 갖는 사람이 확실히 많아졌다는 것은 사실이에요.

### 💰 왜 굳이 고생스러운 창업을? [02:34]

창업 열풍의 배경을 두 가지로 정리할 수 있어요:

1. **정보 보급화** — 해외 우수 창업 사례(특히 빅테크)를 누구나 쉽게 접할 수 있는 시대
2. **AI 시대로 진입 장벽 하락** — 누구나 자기만의 컴퍼니를 빌드하는 게 쉬워짐

> "내 머릿속에 있었던 거를 진짜 만들어 본 거니까, 그 재미는 비교할 수가 없다"  
> — 김민할 컨설턴트

- 창업 소득은 근로소득이 아니라 **사업소득**이라 __업사이드(상방)가 무한__하다는 것도 큰 매력이에요.
- 조단 주변에도 창업으로 성공해서 *비용을 크게 고려하지 않고 생활하는* 사람들이 있다고 해요.
- 다만 **다운사이드(하방)도 무한히 뚫릴 수 있다**는 점은 반드시 인지해야 해요. 😅

## 🧠 창업이 잘 맞는 사람의 성향 [04:07]

### ✅ 잘 맞는 성향

| 성향 | 설명 |
|------|------|
| **자기주도적** | 본인이 원하는 것을 스스로 이루려는 추진력 |

| **목표지향적** | 자기주도성과 시너지를 내며 목표에 도달 |
| **네트워킹에 거리낌 없음** | 내부 인재 채용이든 외부 미팅이든 프로페셔널하게 사람을 만남 |
| **비판적 사고** | 똑같은 사물을 봐도 "왜?"를 먼저 떠올리는 시각 |
| **문제 해결 연습** | "무엇이 문제인가"를 고민하는 습관이 체화된 사람 |

- 경영학과에서 창업하는 친구들의 공통점:
  - __일에 대한 고집__이 있다
  - 남들과 다른 걸 추구한다
  - 누가 지시하면 **"왜? 내가 왜?"** 라고 먼저 반문한다 😂
  - *즉, 조직 생활이 잘 안 맞을 수 있는 사람*

### ⚠️ 안 맞을 수 있는 성향 [08:16]

- **미래에 대한 가시성·계획을 중시하는 통제형**
- 조단 본인도 통제형이라고 고백했어요:

> "기창업자분들은 문제 터지는 게 디폴트인데, 저는 리스크가 일어나지 않게 통제하고 계획하는 성향이에요"  
> — 조단

- 김민할 컨설턴트도 원래 통제형·계획형이었지만 **창업 현실에서는 계획 세울 시간에 빨리 실행**해야 한다는 걸 체감했다고 해요.
  - 내일, 모레 시장이 바뀌기 때문
  - 처음에는 **불안감이 엄청나지만**, 적응하면 "그때 해결하면 되지 뭐"가 됨
- 불안함을 많이 느끼는 분이라면 __처음부터 뛰어들기보다 안전한 스텝으로 접근__하는 게 맞아요.

────────────────────────────

## ⚖️ 창업 vs 취업, 장단점 비교 [06:11]

### 📈 창업의 장점

1. **나만의 것을 만드는 보람** — 크리에이터 기질이 있는 사람에게 최적
2. **상방 무한한 사업소득** — 근로소득 대비 업사이드가 열려 있음
3. **압축 성장 경험** — 20대에 해보면 __자전거 이론처럼 백날 강의 듣는 것보다 10분 타보는 게 빠르다__

> "감나라 배나라 10년 했지만, 규모와 상관없이 직접 기업을 운영해 보는 거랑은 차원이 다르더라고요"  
> — 김민할 컨설턴트

### 📉 창업의 단점

1. **워라벨 극악무도** 😵
   - 컨설턴트도 새벽 4시까지 일하지만 → **월급 받으면 분노가 내려감**
   - 창업자도 새벽 4시까지 일하지만 → **겨우 직원 월급 주고 다음 날 다시 시작**, 분노가 안 내려감
2. **불확실성** — 계획이 수시로 바뀌는 환경
3. **심리적 고립감·번아웃** — 아래에서 자세히 다뤄요

────────────────────────────

## 🚨 창업의 현실적 리스크 3가지 [09:49]

### 1️⃣ 금전적 리스크 [09:49]

- 창업에는 **무조건 자본이 필요**해요.
- 대학생 입장에서 자본 조달 방법:
  - 학교·소속 단체의 **창업 지원 프로그램**
  - **정부 지원금**
  - **VC(벤처캐피탈)** 투자
  - **AC(액셀러레이터)** 투자
  - **컴퍼니 빌더** — 좋은 인재·아이디어·기술을 찾아 아예 같이 회사를 세워주는 방식
- 하지만 그렇게 해도 __자본은 늘 부족__하며, **채무(빚)를 질 각오**도 어느 정도 필요해요.

### 2️⃣ 시간적 리스크 [11:22]

- 2~3년을 한 아이템에 쏟았는데 시장에서 안 먹히거나, 내부 원인으로 팀이 와해될 수 있어요.
- *"실패하면 넥스트는 어떻게 하지?"* 라는 불안이 크지만, 성공하는 창업자들은 __리스크를 알면서도 "너무 만들고 싶으니까"__ 뛰어든다고 해요.
- **그래서 더더욱 어릴 때(대학생 때) 빨리 시작하는 게 유리**하다는 것이 컨설턴트의 조언이에요.

### 3️⃣ 심리적 리스크 (고립감·번아웃) [11:54]

- 창업에서 **가장 큰 리스크**라고 김민할 컨설턴트가 꼽았어요.
- 잘 안 될 때 이야기할 사람이 없어요:
  - 상사도 없고, 선배도 없고
  - **안 되면 다 내 탓**

> "어떻게 해야 될지 모르겠는데, 어디도 물어볼 사람이 없는 거예요. 김연경 선수 짤 그대로 — '네가 해야지!'"  
> — 김민할 컨설턴트

- 하지만 **왜 안 됐는지 고민하고 다음 도전을 준비하는 시간의 학습 효과는 엄청나게 빠르다**고 해요.

────────────────────────────

## 🤖 AI 시대의 1인 창업과 팀 리스크 [13:25]

### AI 1인 창업, 정말 가능한가?

- AI 에이전트, **바이브 코딩** 등을 활용해 소수 팀원으로도 여러 명이 일하는 것처럼 운영하는 사례가 실제로 늘고 있어요.
- 하지만 김민할 컨설턴트의 견해:

> "AI 시대가 돼도 사업이 크려면 어느 정도의 사람은 필요하다고 아직까지는 생각해요"

### 🧩 팀 리스크 — 핵심 인재 이탈 [13:57]

- 컨설팅 출신(MBB 등)이 스타트업 **C레벨(임원급)**로 영입되는 경우가 많아요.
  - 보통 투자 유치 후 안정기에 영입
- 문제는 __금방 나가는 경우가 매우 많다__는 것:
  - 창업자 입장: *"똑똑한 오른팔이 왔는데 떠나면 — 내 비전이 없어 보이나? 내 사업 모델이 문제인가?"*
  - 이걸 견디는 과정이 **정신적으로 가장 고통스러운 순간** 중 하나

### 👥 피플 매니지먼트의 어려움 [14:57]

- 조단도 팀을 이끌어본 경험에서 **내 고집과 팀원 의견의 밸런싱**이 가장 어려웠다고 해요.
- 객관적으로 옳은 정답도 팀 다수가 동의하지 않으면 어떻게 해야 하는지 — 이것이 __진정한 Executive(경영자) 의사결정__의 핵심이에요.

────────────────────────────

## 🛠️ 실전 조언: AC·컴퍼니빌더 활용법 [15:28]

자본이 걱정되는 대학생 창업자를 위한 단계별 가이드:

| 단계 | 지원 주체 | 받을 수 있는 것 |
|------|-----------|-----------------|
| **1단계** | 컴퍼니 빌더 | AC 연결 전까지 전 과정 매니징 (아이디어·기술 보유 시) |
| **2단계** | AC (액셀러레이터) | 공간·팀·멘토링·초기 자금 |
| **3단계** | VC (벤처캐피탈) | 본격 투자 유치 |

- **뛰어난 아이디어나 랩에서 개발한 기술**이 있다면 → 컴퍼니 빌더부터 찾아가세요.
- 그렇지 않더라도 **AC 프로그램**을 통해 공간·팀·멘토링을 지원받을 수 있어요.

## 💬 마무리 메시지 [16:29]

### 조단의 메시지

> "대학생 때야말로 다양한 것을 시도하고 사회 진출 전에 맞는 길인지 검증해 볼 수 있는 단계예요. __실패에 대한 불안을 내려놓고 이것저것 해 보는 게 중요한 자세__라고 생각합니다."

### 김민할 컨설턴트의 메시지

## 🎤 1절 — 사랑의 규칙을 아는 두 사람 [00:01]

노래는 부드러운 신스팝 인트로와 함께 시작돼요.

- **"We're no strangers to love"** — 우리는 사랑에 낯선 사이가 아니라고 운을 떼요.
- __**"You know the rules and so do I"**__ — 서로 사랑의 규칙을 알고 있다는 전제를 깔아요.
- **"A full commitment's what I'm thinking of"** — 화자가 생각하는 건 **완전한 헌신**이에요.
- *"You wouldn't get this from any other guy"* — 다른 누구에게서도 이런 사랑은 받을 수 없을 거라는 자신감을 드러내요.

> 💡 1절은 **선언문** 같아요. "나는 진심이고, 너도 그걸 안다"는 확신에 찬 도입부예요.

## 🎶 1차 코러스 — "Never Gonna Give You Up" [00:35]

### 프리코러스

- **"I just wanna tell you how I'm feeling"** — 내 감정을 말하고 싶다.
- **"Gotta make you understand"** — 꼭 이해시키고 싶다.

### 코러스 (후렴)

이 곡의 심장부이자, 전 세계인이 아는 그 부분이에요:

- ✅ **Never gonna give you up** — 절대 포기 안 해
- ✅ **Never gonna let you down** — 절대 실망시키지 않아
- ✅ **Never gonna run around and desert you** — 절대 떠나지 않아
- ✅ **Never gonna make you cry** — 절대 울리지 않아
- ✅ **Never gonna say goodbye** — 절대 이별을 말하지 않아
- ✅ **Never gonna tell a lie and hurt you** — 절대 거짓말로 상처 주지 않아

> __6개의 "Never gonna"가 연속으로 쏟아지며, **절대적 사랑의 서약**을 만들어요.__

## 💬 2절 — 서로 알면서도 말 못 하는 마음 [01:09]

- **"We've known each other for so long"** — 오래전부터 알던 사이.
- __**"Your heart's been aching but you're too shy to say it"**__ — 네 마음이 아프지만 부끄러워서 말을 못 하고 있다는 걸 화자는 알고 있어요.

- **"Inside we both know what's been going on"** — 속으로는 둘 다 무슨 일이 일어나고 있는지 안다.
- **"We know the game and we're gonna play it"** — 이 사랑의 게임, 우리 함께 하자.
- *"Don't tell me you're too blind to see"* — 모른 척하지 마, 라는 직접적인 호소예요.

> 📌 2절은 1절의 자신감에서 한 발 나아가, **상대방의 감정까지 꿰뚫고 있다**는 확신을 보여줘요.
