# 🎬 AI가 조직을 망치는 이유
영상 보면서 같이 읽기 좋게 정리했어요 👇 (옵시디언에도 저장됨)

## 🎯 한눈에 요약
> - **AI 역설**: 팀원 개인 생산성은 수십% 향상됐지만, 조직 전체 생산성 증가는 고작 **1%** — AI에 쏟는 비용 대비 참담한 수치
> - **워크슬롭(Work Slop)**: AI가 만든 그럴듯하지만 알맹이 없는 산출물. 직원의 40%가 이를 받고, 처리에 **약 2시간** 소비
> - **진짜 병목은 팀원이 아니라 팀장**: 산출물은 10배 늘었는데 검토량도 10배 → 의사 결정 마비 → 조직 생산성 정체
> - **해법은 '검토 규정'**: AI를 쓰든 안 쓰든, 무엇을 어떤 양식으로 검토할지 사전에 규정해두면 불필요한 에너지 제거
> - **아마존 WBR 차용**: 주 1회 1시간, 3가지 핵심 질문(고객 경험·비즈니스 변화·목표 달성 여부)으로 인풋 지표 중심 토론
> - **AI 산출물 개수로 평가하면 팀원은 '쓰레기 생산형'이 됨** — 평가 기준이 행동과 결과로 이어지는 인풋이어야 함

## 🤔 AI 생산성 역설 — 개인은 오르는데 조직은 제자리 [00:30]

- 한국 직장인 **AI 활용률 51.8%** (한국은행 조사) — 미국(26.5%)의 약 **두 배**
- 그런데 AI 도입으로 인한 실질 생산성 향상은 고작 **1%**
- AI 도입 회사의 **무성과 비율 80%** 이상 (별도 조사)

> "모든 구성원은 AI 덕에 일을 더 쉽고 빠르게 할 수 있게 됐는데, 왜 조직의 생산성은 크게 바뀌지 않을까?"

한 연구(2024년 7월)에서 측정한 결과:

- **AI 사용자 본인이 느끼는 속도 향상** — 수치: +20%
- **실제 KPI 변화** — 수치: **-19%**
- **체감과 현실의 갭** — 수치: **39% 포인트**

*즉, 빨라졌다고 느끼지만 실제로는 더 느려진 것.*

**이유**: 비즈니스의 근간은 __의사 결정__이다. 아무리 분석이 넘쳐도 **결정이 없으면 투자도, 프로세스 변화도, 결과물도 없다.**

────────────────────────────

## ⚠️ 워크슬롭(Work Slop) — 신뢰를 갉아먹는 AI 쓰레기 [04:37]

### 워크슬롭이란?

> **Work Slop** = AI가 만들어서 그럴듯해 보이지만, 실제로 적용하려 보면 **알맹이가 전혀 없는 산출물**

- 최근 옥스퍼드 사전에 신조어로 등재될 만큼 보편화됨

### 얼마나 퍼져 있나? (Harvard Business Review × Stanford, 2024년 9월)

- **동료 → 동료** — 비율: **40%**
- **부하 → 상사 보고 시** — 비율: **18%**
- **상사 → 부하 (탑다운)** — 비율: **16%**

- 워크슬롭 하나를 처리하는 데 평균 **1시간 56분** 소요
- AI로 만들어서 빨라진 사람의 시간 절약이, __동료의 검증 시간 증가로 상쇄__됨

### 신뢰 문제가 더 심각하다

- 워크슬롭을 한 번 받아보면 **그 사람의 모든 산출물에 대한 신뢰가 붕괴**됨
- "이 사람이 AI로 대충 돌린 결과물을 나한테 넘기는구나"
- 워크슬롭을 떠맡은 사람은 일을 던진 사람을 **"덜 유능하다"고 평가**함

- __문제는 당사자가 자신이 신뢰를 잃고 있다는 사실을 영원히 모를 수도 있다는 것__

────────────────────────────

## 🔍 문제의 구조 — 왜 팀장이 병목이 되는가 [08:15]

```
팀원: AI로 산출물 10배 증가
          ↓
팀장: 검토량도 10배 증가 → 다 읽을 시간 없음
          ↓
의사 결정 지연 → "이거 해봐, 저거 해봐" 반복
          ↓
팀원: "팀장이 맨날 말 바꿔" → 불만 + 실제 성과 없음
          ↓
조직 생산성: 변화 없음
```

팀원 입장에서 검토 규정이 없으면:
- **기준이 없으니** → 통과되거나 무작위로 까임
- **피해 다닐 구멍만 찾음** → "AI가 이랬어요", "정보가 없었어요"
- 열심히 일했는데 성과는 없고 **불만만 쌓임**

────────────────────────────

## ✅ 해법: 검토 규정 만들기 [09:16]

### 검토 규정이란?

> AI를 쓰든 안 쓰든, **무엇을 어떤 양식으로 소통하고 결정할지** 사전에 정해두는 것

**검토 규정이 있으면:**
- 불필요한 것은 안 봐도 됨 → **에너지 집중**
- 같은 양식으로 누적 관리 → **연속성 비교 가능** (작년 vs 올해)
- 중요한 KPI와 변화 포인트만 추출 → **질(質) 중심 패러다임**

**검토 규정이 없으면:**
- 모든 산출물을 다 봐야 함 → 에너지 분산
- 양식이 달라 → 비교 불가 → 검토량만 증가 → 선택·집중 불가

📌 **핵심**: 업무 내용보다 **무엇을 지속적으로 볼 것인가**를 먼저 규정하라

────────────────────────────

## 📊 아마존 WBR — 주 1회 1시간 리뷰 시스템 [11:50]

### WBR이란?

**WBR = Weekly Business Review**
- 아마존이 20여 년간 운영해온 시스템
- 주 1회(아마존은 매주 수요일 오전) **1시간** 고정 사용
- 수많은 지표 중 **변화가 있는 것만** 집중 리뷰
- CEO/CFO 없어도 **사업 책임자 주도**로 진행

> 참고 도서: 📚 *워킹 백워즈(Working Backwards)* — 아마존이 이 시스템을 운영하는 방식 정리

**리더 권장 학습**: PRFAQ · WBR · 6페이저 — AI 시대에 맞는 팀 검토 규정 설계의 기반

────────────────────────────

## ❓ WBR 3가지 핵심 질문 [13:24]

### Q1. 고객이 어떤 경험을 했는가?

- 우리가 서비스하는 **고객이 누구인지 먼저 규정**
- 그 고객은 이번 주에 어떤 변화를 경험했는가?
- __많은 회사가 이 질문을 가장 소홀히 한다__

### Q2. 우리 비즈니스는 지난주에 어떻게 변했는가?

- KPI 기준으로 숫자의 변화를 **예민하게** 추적
- 매출 증감, 과정 지표(선행 지표) 움직임 분석
- 다음 의사 결정을 위한 **기초 데이터**로 활용

### Q3. 목표를 향해 잘 가고 있는가? (🎯 가장 중요)

- AI로 뭘 했는지, 보고서가 몇 장인지가 아니라 → **"So what?"**
- 방향이 맞냐, KPI가 움직이냐를 묻는 최종 관점
- __많은 회사가 2번만 보는데, WBR의 핵심은 **1번과 3번**__

> 2번(지난주 변화)에만 집중하면 → 결과 지표를 놓고 백날 토론해봐야 답이 없다

────────────────────────────

## ⚡ 인풋 vs 아웃풋 — 행동 중심 토론법 [15:58]

### 개념 정리

- ****아웃풋 지표**** — 설명: 최종 결과 (매출, KPI) · WBR에서의 역할: 보고만 함 — **토론 X**
- ****인풋 지표**** — 설명: 과정·원인, 통제 가능한 행동 · WBR에서의 역할: **집중 토론 대상**

- AI를 써서 아웃풋(보고서, 분석 결과)을 빠르게 만드는 건 그냥 **활동 리스트**일 뿐
- 진짜 인풋 = "AI 분석으로 어떤 가설을 검증했는가? **어떤 의사 결정이 바뀌었는가?**"
- 진짜 아웃풋 = "고객이 행동했는가? 최종 지표가 바뀌었는가?"

### 나쁜 토론 vs 좋은 토론

❌ **나쁜 토론**: "이번 달 매출 떨어졌네요. 어떻게 할까요?"
→ 아무도 모름, 답 없음

✅ **좋은 토론**: "1분기에 신규 데모 미팅 100개 잡기로 했는데 60개밖에 못 했어요. **왜 그렇습니까? 어디서 막혔습니까?**"
→ 인풋 데이터를 바꿔야 아웃풋이 바뀜

### ⚠️ 절대 하지 말아야 할 것

> __**AI 산출물 개수로 팀원을 평가하는 순간**, 팀원은 '쓰레기 생산형'이 된다__

이건 팀원의 문제가 아니다. **그렇게 평가하도록 구조를 만든 리더의 문제**다.

────────────────────────────

## 🌱 우리만의 체계 자산화하기 [18:02]

- WBR은 하나의 **샘플**일 뿐 — 아마존 방식을 그대로 따라 하라는 게 아님
- **우리 부서/팀만의 가이드라인**을 하나씩 만들어가는 것이 목표
- 방법:
  1. 간단한 질문만으로 일단 **해보기**
  2. 팀원에게 의견 묻기: "이렇게 하니까 생산성 높아지는 것 같아?"
  3. 피드백 반영해 **양식을 조금씩 바꿔가기**
- 이 과정이 쌓이면 → 교육도 필요 없고, 불필요한 태스크 양산도 방지됨

📥 WBR 기본 양식/가이드라인은 영상 더보기란 또는 고정 댓글 링크에서 다운로드 가능

────────────────────────────

## 💡 핵심 정리
> - **AI 생산성 역설**: 개인은 올라도 조직은 1% — 의사 결정이 막혔기 때문
> - **워크슬롭 주의**: 그럴듯하지만 알맹이 없는 AI 산출물 → 신뢰 붕괴, 검증 시간 2배 증가
> - **리더가 해야 할 것**: 검토 규정 만들기 — 무엇을, 어떤 양식으로, 얼마나 자주 볼지 사전 규정
> - **WBR 3질문**: ①고객 경험 ②비즈니스 변화 ③목표 달성 여부 — 특히 1번·3번이 핵심
> - **평가 기준을 바꿔라**: AI 산출물 개수 → __고객과 KPI에 직접 연결되는 행동(인풋)__ 으로
