# 🎬 [#유퀴즈온더블럭] 낮은 자존감으로 자괴감에 빠진 사람들 주목👀 내면 소통 전문가가 알려주는 자존감 높이는 방법❗
영상 보면서 같이 읽기 좋게 정리했어요 👇 (옵시디언에도 저장됨)

## 🎯 한눈에 요약
> - **인정 중독**은 타인의 시선에 삶의 모든 결정을 맡기는 상태 — SNS 좋아요 수에 기분이 좌우된다면 이미 중독 신호
> - **인생의 주인공**이 된다는 건 내 행동에 대해 아무에게도 해명·설명·변명할 필요를 느끼지 않는 상태
> - **자녀 양육**: 결과물을 칭찬하지 말고 과정의 행복을 물어라 — "그 그림 그릴 때 재밌었어?" 가 핵심
> - **자기 존중 = 타인 존중**: 뇌과학적으로 자기·타인 정보 처리 영역이 동일 → 나를 깎아내리는 사람은 남도 깎아내림
> - **명상의 핵심은 억제가 아닌 알아차림(Awareness)** — 생각은 내가 하는 게 아니라 나에게 일어나는 사건
> - **존 2 유산소 운동** 30분 × 주 3회 × 2달 → 심박 안정 → 불안 감소 → 마음 근력 향상

1. 인정 욕구 vs 인정 중독 — 무엇이 다른가 — [01:04]

4. 자녀 양육 — 자율성과 칭찬의 함정 — [04:13]

## 🧠 인정 욕구 vs 인정 중독 — 무엇이 다른가 [01:04]

인정받고 싶은 욕구 자체는 **자연스럽고 건강한 것**이다. 활력과 에너지를 주고, 사회 속에서 우리를 건강하게 만든다.

문제는 **인정 중독**으로 넘어갈 때다.

- **인정받으면 기분 좋음** — 인정 중독: 인정받으면 **지나치게** 기분 좋음
- **인정 못 받으면 아쉬움** — 인정 중독: 인정 못 받으면 **급격히** 다운됨
- **내가 판단해서 결정** — 인정 중독: **타인의 시선**에 따라 결정

> 인정에 내가 의존적으로 되는 것. 인정을 받으면 지나치게 기분이 좋아지고, 못 받으면 지나치게 낮아져요. 그게 중독이에요.

────────────────────────────

## ⚠️ 인정 중독이 삶을 어떻게 망치는가 [02:07]

인정 중독에 빠지면 **삶의 거의 모든 의사결정을 타인의 시선 기준으로** 내리게 된다.

- "이 물건 사면 남이 어떻게 볼까?"
- "이 음식점에 가면 SNS에 올릴 수 있을까?"
- SNS에 올리려고 살게 됨 — __사는 모습을 올리는 게 아니라, 올리려고 살게 됨__

> 타인한테 개 목줄을 나눠 주는 거예요. 그리고 이들이 원하는 대로 내가 끌려다니겠다는 것.

특히 **10대 청소년**은 인정받을 때 뇌의 쾌감 반응이 성인보다 강해 더 취약하다.

### 📌 인생의 진짜 주인공이란

> **진짜 인생의 주인이 된다는 건, 내가 뭘 하든지 아무런 설명이나 해명, 변명의 필요성을 아예 안 느끼는 상태.**

어려서부터 엄마·아빠에게 해명하고 칭찬받는 습관이 굳어지면, 어른이 돼서도 머릿속 가상의 '심판자'에게 계속 설명하게 된다.

────────────────────────────

## 🔓 인정 중독에서 벗어나는 법 [05:46]

인정 중독 상태 = **나를 평가 대상으로 놓는 것**

이걸 뒤집는 방법:

> __내가 만나는 사람들을 내가 사랑하고 존중한다__ — 평가받는 입장에서 **인정해 주는 주체**로 전환

실전 예시 — **면접**:
- ❌ 잘 보이려고 노력 → 긴장 → 자신을 잃음

- ✅ "와, 이 회사에 입사해서 임원까지 되신 분들이네. 존경스럽다." → 사랑과 존중으로 면접관을 바라봄 → 긴장 해소, 내가 주인공이 됨

**핵심 공식**: 평가받는 객체 → 존중하는 주체로 전환

────────────────────────────

## 👶 자녀 양육 — 자율성과 칭찬의 함정 [04:13]

### 자율성 키우기

- ❌ "양말 신어" (지시)
- ✅ "빨간 양말 신을래? 파란 양말 신을래?" (선택지 제공)

→ 작은 선택부터 __내가 결정했다는 느낌__을 반복적으로 경험해야 한다.

### 과도한 칭찬의 역효과

그림 한 장에 "천재 아니야?"라고 칭찬하면:
1. 다음에 그림을 그렸을 때 칭찬이 줄어듦
2. 얘: "나 천재 아닌가 봐" → 불안 증폭
3. 점점 인정에 탐닉하게 됨

**올바른 칭찬 방향**:

> 결과물을 칭찬하면 안 됩니다. **그 과정에서 네가 행복했냐, 재밌었냐** — 그걸 자꾸 물어봐 줘야 해요.

────────────────────────────

## 🧬 자기 존중 ↔ 타인 존중의 뇌과학 [07:50]

흔한 오해: "내가 나를 존중하면 남을 무시하게 되는 거 아냐?"

뇌과학적 사실:
- __자기 정보 처리 뇌 영역 ≈ 타인 정보 처리 뇌 영역__ (거의 일치)
- 결과: **자기 존중심이 높아지면 → 타인도 자연스럽게 존중하게 됨**

반대도 성립:
- 남을 다 깎아내리는 사람 = **속으로 자기 자신을 비하하고 있는 것**
- 나도 무시 + 남도 무시 = 전전두피질(이성·판단 뇌)이 약화된 상태

────────────────────────────

## 💛 여섯 가지 자기·타인 긍정 훈련 [09:26]

부정적 사고를 긍정적으로 바꾸는 **내면 소통 훈련**:

1. **용서** — 나를 먼저 용서하고, 타인을 용서
2. **연민** — 나와 타인의 고통을 이해
3. **사랑** — 로맨틱 러브가 아닌, 나와 타인의 건강·행복을 바라는 마음
4. **수용** — 있는 그대로 받아들이기
5. **감사** — 작은 것에 감사하는 훈련
6. **존중** — 나와 타인을 동등하게 존중

> 사랑과 존중 **없이** 사는 삶이 훨씬 더 어렵고 괴롭습니다.

*단, 하루아침에 되지 않는다 — 꾸준한 연습이 필요하다.*

────────────────────────────

## 💢 부정적 감정의 정체 — 생각이 아니라 몸의 신호 [11:33]

> 부정적인 감정, 분노, 짜증은 몸에서부터 올라옵니다. **몸의 신호예요.**

- 심장 박동 이상, 근육 긴장, 내장 신호 → 짜증 발생
- 짜증이 올라오면 가장 가까이 있는 사람(가족 등)에게 원인을 투사하게 됨

따라서:
- **감정 문제 ≠ 생각 문제**
- **감정 문제 = 몸 문제**

→ 해결책: 몸을 편안하게 하는 **움직임·명상**

────────────────────────────

## 🧘 명상이란 무엇인가 — 알아차림(Awareness) [12:36]

### 가장 흔한 오해

> 명상이 **생각을 억제하고 누르는 것**이라는 착각

### 올바른 이해

> **생각은 내가 하는 게 아니에요. 생각은 나한테 일어나는 사건이에요.**

- "2분 뒤에 무슨 생각할지 결정해" → 불가능
- 생각은 내 뜻과 상관없이 떠오름

### 명상의 실제 = 알아차림(Awareness)

내 안에 어떤 생각이 떠올랐는지를 **알아차리는 능력**을 키우는 것.

훈련법:
- **호흡 알아차리기** — 지금 이 순간 숨이 들어오고 나가는 걸 느끼기
- 가만히 앉을 필요 없음 — **걷기 명상, 달리기 명상, 수영 명상**이 더 효과적
- 움직이면서 몸을 알아차리는 것 = 감정을 다스리는 가장 직접적인 방법

────────────────────────────

## 🏃 마음 근력을 키우는 존 2 트레이닝 [14:09]

심장 박동을 5개 구역(Zone)으로 나눴을 때 **존 2(Zone 2)** 강도:

- **강도** — 내용: 살살 걷는 것보다 빠르고, 전력 달리기보다 느린 수준
- **시간** — 내용: 1회 **30분 이상**
- **빈도** — 내용: **주 3회**
- **기간** — 내용: **약 2달**

효과:
- 평소 심박수 **안정화**
- 심장이 천천히 뛰게 됨 → **불안감 감소**
- 몸 건강은 덤, **마음 근력 향상**이 진짜 목적

> __몸 건강해지는 거는 덤이고, 사실은 마음 건강에, 마음 근력 향상에 큰 도움이 된다.__

────────────────────────────

## 💡 핵심 정리
> - 🔑 **인정 중독 탈출법**: 평가받는 객체에서 → 존중하는 주체로 관점 전환. 면접·일상 모두 적용 가능
> - 🔑 **아이 칭찬**: "잘했다"(결과) ❌ → "재밌었어?"(과정) ✅ — 과도한 칭찬은 인정 중독을 심는다
> - 🔑 **남 깎아내리는 사람 = 자기 자신을 속으로 비하 중** — 자기 존중이 먼저다
> - 🔑 **명상 = 억제가 아닌 알아차림** — 생각은 컨트롤 대상이 아니라 관찰 대상
> - 🔑 **존 2 유산소 운동**(살짝 빠른 걷기~가벼운 조깅) 30분 × 주 3회 × 2달 → 심박 안정 → 불안 감소
