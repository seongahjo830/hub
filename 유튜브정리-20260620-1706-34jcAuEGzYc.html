# 🎬 잠들기 직전까지 관리하는 탑모델 한혜진의 나이트루틴 최초공개｜마스크팩, 스킨케어, 마사지기 정보 (주름, 탄력, 보습 다 잡는 동안 피부 비결)
영상 보면서 같이 읽기 좋게 정리했어요 👇 (옵시디언에도 저장됨)

## 🎯 한눈에 요약
> - 탑모델 한혜진의 **퇴근 후 취침 직전까지의 나이트 루틴** 최초 공개
> - 스킨케어 핵심: **클렌징 → 반신욕 중 팩 → 고농축 에센스 → 아이크림 → 취침 직전 눈가 수분크림** 5단계 루틴
> - **"목도 얼굴"** — 피부과 의사 조언 따라 목까지 모든 스킨케어 적용
> - 샐룰라이트 오일 + 바디 로션을 섞어 전신 관리, 무릎은 필립스 인프라케어로 별도 케어
> - 관리 철학: "혹독한 게 아니라 **나를 돌보는 것**" — 내가 나를 케어하지 않으면 누가 해주겠냐
> - 수면 환경까지 세팅: 온수매트·가습기·베개 3개로 **잠의 질**도 철저히 관리

────────────────────────────

## 📑 목차

1. 퇴근 후 — 연어 샌드위치 만들기 — [00:32]
2. 영양제 & 메이크업 브러시 세척 — [02:36]

4. 반신욕 중 스킨케어 — 팩 & 바디케어 — [06:16]

────────────────────────────

## 🏠 퇴근 후 — 연어 샌드위치 만들기 [00:32]

하루 일과를 마치고 귀가. 배가 고파서 바로 주방으로 향한다.

- 직접 **연어 샌드위치** 제작 — 크림치즈 + 양파 + 후추
- 간단하지만 양식스러운 한 끼

> "진짜 맛있다. 간단하게 만들었는데 맛있네요."

────────────────────────────

## 💊 영양제 & 메이크업 브러시 세척 [02:36]

- 아침에 바빠서 못 챙긴 **영양제**를 저녁에 챙겨 먹음 *(종류는 공개 X)*
- 다음 날 녹화가 있어서 **메이크업 브러시 전부 세척**
	- 사용 제품: __**비노나 클렌저**__
	- 매 사용마다 세척 — "입었던 속옷 또 입는 느낌이라 그냥 안 하면 기분이 이상해"

────────────────────────────

## 🛁 반신욕 준비 — 이욕 솔트 & 클렌징 [03:40]

### 반신욕 솔트 [03:40]

- __**이욕 솔트**__ — 한혜진이 "너무너무 사랑하는" 제품
- 향: **시원하면서 우디하고 약간의 흙 냄새** — 직접 재현 시도했으나 실패할 만큼 독특한 향

### 세안 [04:11]

물 받는 동안 세안을 먼저 진행.

1. **크림 타입 클렌저**로 1차 세안 *(오늘은 아이라이너·마스카라 없어서 아이 리무버 생략)*
2. __**트로이아루케 슈가 파우더 클렌저**__로 2차 세안
	- 각질·모공 노폐물 제거 → 다음 날 베이스 메이크업이 들뜨지 않게
	- "어제 밤에 이걸 쓰고 아침에 베이스 까니까 확실히 잘 먹더라"

────────────────────────────

## 🧖 반신욕 중 스킨케어 — 팩 & 바디케어 [06:16]

### 마스크팩 [06:16]

계절에 맞게 팩을 바꿔 사용:

- **평소·진정** — 팩 종류: **크림 타입 수분팩**
- **여름→가을 (자외선 후 미백)** — 팩 종류: **화이트닝 팩**

- 목에도 **목 전용 강화 팩** 별도 사용

### 알로에 겔 + 바디 디바이스 [05:45]

- 얼굴에 **일반 알로에 겔** 발라주고
- __**스킨케어 디바이스**__로 마사지

> 피부과 의사 조언: "목도 얼굴이에요. 유수분을 잘 공급해야 목주름을 늦출 수 있다."

### 모발 & 바디 관리 [06:48]

- 서서 머리 감기는 **잘 안 함** — 파워샤워기가 있지만 피부 건조 유발로 거의 미사용
- **바디 스크럽**: 때를 직접 미는 것보다 *"알갱이가 녹으면서 각질을 털어내는 방식"* 선호

- 자기 전 **린스 생략** — 대신 **타월 드라이** 후 마무리

────────────────────────────

## ✨ 욕실 후 스킨케어 루틴 [07:53]

### 1단계 — 고농축 에센스 [07:53]

__**트로이아루케 나이트 리페어 캡슐**__

- 동결건조 캡슐 형태 → 손 위에서 녹이면 고농축 에센스로 변환
- 향: **산뜻함** / 발림성: 엄청 고농축 에센스 느낌
- 정제수·방부제·유아제 **무첨가** — 히알루론산·콜라겐·단백질 함유

🏆 수상 이력:
- 이탈리아 코스모프로프 어워즈 스킨케어 부문 **1위**
- 영국 존베 크레이던 어워즈 **은상 (2위)**
- 대한민국 화장품 **최초 입점**

### 2단계 — 리프팅 부스터 [08:24]

__**트로이아루케 리프팅 부스터 롱**__으로 에센스 위에 덧바르며 마사지

🔑 **마사지 포인트**:
- **턱 근육** — 집중할 때 무는 버릇으로 뭉침
- **흉쇄유돌근** (목 옆 근육) — 이쪽도 풀어주기
- **입꼬리 잡아주는 근육** 주변 마사지

### 3단계 — 아이크림 [10:00]

> "좋은 거 위에 좋은 거 또 바르는 거지."

- **눈가 주름** 집중 케어 *(많이 웃어서 주름이 생긴다고)*
- 남은 아이크림으로 **입술**도 마무리

────────────────────────────

## 🤎 바디 로션 & 셀룰라이트 오일 [10:31]

- **바디 로션 + 셀룰라이트 예방 오일**을 섞어서 전신 도포
- 허벅지 셀룰라이트 집중 관리

### 관리 철학 [11:03]

> "저는 몸이 재산이기 때문에 언제 어디서 노출 상황이 올지 몰라서 한 군데도 빼놓지 않고 관리하려고 노력해요."

> "관리라는 말이 대단해 보이지만, 그냥 **나를 돌본다, 스스로에게 조금 관심을 갖는다** — 이렇게 생각하면 좋을 것 같아요."

- 실제로는 **물렁한 편** — 술도 마시고, 그저 최선을 다할 뿐
- 목표: *"조금 더 늦게 늙기 위해서"*

────────────────────────────

## 🌙 수면 환경 세팅 [12:38]

### 무릎 케어 [12:08]

- __**필립스 인프라케어**__ (적외선 치료기) 사용
- 뉴욕에서 넘어져 연골 손상 후 매해 환절기(10월~)마다 무릎이 시림
- *현재 구입 가능 여부 불명확*

### 수면 환경 [13:09]

방 온도 25.6°C, 습도 35% 확인 후:

- **온수매트** 가동 — "온수매트의 시즌이 왔다"
- **가습기** 가동 — 35~36%는 약간 건조한 편
- **공기청정기** 가동

### 베개 세팅 [13:41]

> 베개 **3개** 사용:
> 1. 안고 자는 베개
> 2. 배 밑에 끼는 베개
> 3. 사이드(옆으로 돌 때) 베개

- 이유: 360도로 돌면서 자는 습관 + 이불을 다 말고 자는 습관

────────────────────────────

## 😴 취침 직전 마지막 케어 [14:12]

머리맡에 **수분 크림**을 놔두고, 잠들기 바로 직전 눈가에 발라준다.

> "7~8시간 자는 동안 건조해지는 건 어쩔 수 없어요. 자다 일어나서 크림 바를 수는 없잖아요."

- 눈가 + 건조한 부위에 한 번 더 도포 후 취침

────────────────────────────

## 💡 핵심 정리
> - 🔑 **클렌징이 기본 중 기본** — 각질·모공 노폐물을 제거해야 다음 날 베이스가 제대로 먹힘
> - 🔑 **목 = 얼굴** — 유수분 공급을 얼굴과 동일하게, 목 전용 팩도 따로 사용
> - 🔑 **트로이아루케 나이트 리페어 캡슐** — 동결건조 캡슐 형태, 국제 수상 이력 있는 한혜진 애정 에센스
> - 🔑 **취침 직전 눈가 수분크림 한 번 더** — 수면 중 건조함 대비, 머리맡에 상시 배치

> - 🔑 **관리의 본질은 "나를 돌보는 것"** — 연예인만의 비결이 아니라, 스스로에게 관심 갖는 루틴
