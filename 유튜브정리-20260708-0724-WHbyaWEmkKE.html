# 🎬 16강 토너먼트 아르헨티나 vs 이집트 / KBS 2026 북중미 월드컵 2026.07.08.

## 🎯 한눈에 요약
> - 16강에서 이집트와 맞붙은 아르헨티나, 전반 이브라힘 헤더 선제골로 충격적 출발

> - 후반 22분 지코 추가골로 0:2 벼랑 끝에 몰림
> - 메시가 후반 34분 크로스로 로메로의 추격골을 이끌고, 4분 뒤 직접 동점골 — 월드컵 역대 최다 **21호 골**
> - 후반 추가시간 페르난데스 헤더 역전 결승골 → **3:2 극장 역전승**
> - 다음 상대는 7월 12일 스위스-콜롬비아전 승자 (8강)

## ⚡ 전반 — 이집트의 기습과 아르헨티나의 위기 [00:00]

### 🔴 선제골 허용 [00:00]
- **전반 15분**, 이집트 이브라힘이 아르헨티나 수비 견제를 뚫고 **헤더 선제골**

### ❌ 메시 PK 실패 [00:00]
- 4분 뒤 아르헨티나 페널티킥 획득 — 키커는 __메시__
- 이집트 GK **쇼베이르의 선방**에 막혀 실패

### 🏳️ 프리킥도 골대에 [00:30]
- **전반 31분**, 메시 왼발 프리킥이 절묘한 궤적을 그렸지만 **골대를 맞고 돌아옴**
- 전반 내내 아르헨티나, 공격 실마리를 풀지 못함

## 😰 후반 — 지코 추가골, 0:2 절벽 [00:31]

- **후반 22분**, 이집트 **지코**가 역습에서 추가골
- 순식간에 __0:2__ — 탈락 벼랑 끝

────────────────────────────

## 🌟 메시의 귀환 — 동점까지 [00:38]

### ⚽ 로메로 추격골 [00:38]
- **후반 34분**, 메시의 **정확한 크로스** → 로메로가 마무리해 1:2

### 🔥 메시 직접 동점골 [01:01]
- 4분 뒤, 문전 혼전 상황에서 __메시의 강력한 왼발 슛__ → **극적 동점 2:2**
- 이 골로 **월드컵 역대 최다 21호 골** 기록 수립
- 메시, 격하게 기쁨을 표현하며 역전승을 다짐

## 🏆 기적의 피날레 — 역전 결승골 [01:01]

> "2점 차 열세를 극복하고 3:2 극장 역전승"

- 최종 스코어 **3:2** — 0:2에서 뒤집은 극장 역전승

- 메시, 동료들과 뜨거운 눈물의 감격을 나눔
- 아르헨티나 **8강** 상대: **7월 12일**, 스위스-콜롬비아전 승자와 격돌
