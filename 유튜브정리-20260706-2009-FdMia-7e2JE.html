# 🎬 [장송의 프리렌]으로 배우는 AI 시대 공부법 | 라플위클리 딥다이브 ep.08 - AI 공부법 #궤도 #장송의프리렌 #인공지능  [LIFEPLUS]
영상 보면서 같이 읽기 좋게 정리했어요 👇 (옵시디언에도 저장됨)

## 🎯 한눈에 요약
> - **AI = 프리렌**: 수천 년을 살며 모든 걸 축적한 마법사 — 많이 알지만 '지금 여기'의 의미와 목적은 인간이 정해줘야 한다
> - AI 시대 공부의 패러다임 전환: **"무엇을 아는가"** → **"무엇을 어떻게 물을 것인가"**로
> - 리온 프라이스(비수학자)의 에르데시 문제 해결, 하사비스의 알파폴드 노벨상 → __분야를 건너는 질문이 난제를 푼다__
> - AI 시대 핵심 5력: **질문력 · 연결력 · 검증력 · 맥락력 · 목적력**
> - AI에게 결과를 맡기면 편해지지만, **과정을 맡기면 성장**한다
> - 인간의 공부는 끝나지 않았다 — 다만 목적이 바뀌었다: *지식 소유 → 지식을 인간적으로 사용*

## 🧙 프리렌으로 보는 AI의 본질 [01:04]

### AI = 축적의 괴물 [01:35]

- 프리렌이 강한 이유: **재능 + 시간** — 천 년을 살았기에 무한히 쌓았다
- AI도 마찬가지: 인간이 남긴 책·글·코드·논문·대화·이미지 **모든 패턴을 학습**

> "AI는 어떤 의미에서 축적의 괴물이다. 프리렌처럼 모든 걸 다 쌓았다."

### AI의 한계: 그럴듯함 ≠ 진실 [02:37]

- AI가 유창한 문장을 쓴다고 해서 반드시 진실을 말하는 건 아님
- **책임 있는 판단**을 내릴 수 없음 — 결과에 책임을 안 짐
- 프리렌도 마법은 많이 알지만 인간의 마음을 이해하는 데 오랜 시간이 걸림

────────────────────────────

## 🏫 AI 교육 제1원칙 [03:09]

> __**AI는 많이 아는 존재이지만, 반드시 깊이 이해하는 존재는 아니다.**__

- AI는 지식의 **패턴**을 잘 다룬다
- 그러나 그 지식이 *지금 이 순간, 여기서, 누구에게* 어떤 의미인지 → **인간의 판단 필요**

────────────────────────────

## 🎓 AI 시대 학생의 역할: 좋은 제자 [03:41]

### 페른의 포지션

- 프리렌(AI): 천 년 쌓은 스승 — 시간 여유 있음
- 페른(인간 제자): 짧은 삶 안에서 **목적이 있음** → 어떤 마법이 왜 필요한지 물어야 함

**AI 시대 학생 = 그냥 정답을 받아 적는 사람이 아니다**
- AI라는 프리렌에게 **좋은 질문을 던지는 제자**가 돼야 함

> "교육은 지식을 전달하는 데 있지 않다. 교육은 인간에게 **질문의 방향**을 만들어 주는 일이다."

- 수학을 배우는 이유: 모든 사람이 수학자가 되기 위해서가 아니라 **정확하게 생각하는 법**을 배우기 위해

────────────────────────────

## 🔄 지식 축적에서 질문하는 힘으로 [05:15]

### 공부 패러다임의 변화 [05:46]

- **지식 시대** — 핵심 역량: 많이 외운 사람이 유리
- **검색 시대** — 핵심 역량: 어디서 찾는지 빨리 캐치하는 사람이 유리
- ****AI 시대**** — 핵심 역량: **무엇을 물을지, 어떻게 연결할지** 아는 사람이 유리

### AI 시대에 물어야 할 것들 [06:48]

- 무엇과 무엇을 연결할 것인가?
- 어떤 답이 내 상황에 맞는가?

- 이 답을 어떻게 **검증**할 것인가?
- 이 지식을 누구에게 어떻게 쓸 것인가?

> "AI가 문장을 쉽게 만들어 줄수록, 인간은 더 분명한 **의도**를 배워야 한다."

### 공부의 진짜 의미 [07:19]

- 지식 축적은 다음 단계의 *전제조건*이었다 — 그런데 어느 순간 **"쌓는 것 자체"가 공부**가 돼버림
- 진짜 공부: 완전히 낯선 상황에 딱 들어갔을 때 **무언가를 해내는 능력**을 갖추는 것

────────────────────────────

## 🔬 두 가지 실제 사례 [07:50]

### 사례 1: 리온 프라이스 — 비전공자의 난제 해결 [08:22]

- **2026년 4월**, 23세 리온 프라이스가 __60년간 미해결이던 에르데시 문제의 한 형태를 해결__
- **에르데시 문제**: 20세기 가장 많은 논문을 쓴 수학자 폴 에르데시가 남긴 수백 개의 미해결 문제
- 리온 프라이스는 **수학 전공자가 아님** — 취미가 에르데시 문제 웹사이트에서 문제를 골라 AI에 던지는 것

> "AI가 80분 17초 동안 추론한 결과, 기존 수학자들이 가지 않던 **완전히 새로운 경로**가 나왔다."

- 기존 수학자들: 표준 접근법을 동일하게 밟음
- AI: **인접한 다른 분야의 수학 공식**을 이 문제에 적용 — 완전한 불연속적 도약

⚠️ 핵심: AI가 혼자 뚫은 게 아님 — **리온 프라이스가 어떤 질문을 던졌는가**가 결정적

────────────────────────────

### 사례 2: 데미스 하사비스 & 알파폴드 [12:02]

- 하사비스: 게임 · 체스 · 컴퓨터과학 · AI · 신경과학 배경 — **전통적 생명공학자 아님**
- 단백질 구조 예측 문제: __아미노산 서열로 3차원 단백질 구조를 예측하는 수십 년간의 생명과학 난제__
- **알파폴드**: 3차원 단백질 구조를 완벽에 가깝게 예측하는 AI → 신약·치료제 개발에 혁신

> 2024년 10월: 데이비드 베이커 · 데미스 하사비스 · 존 점퍼 **노벨 화학상 공동수상** — 세 명 중 두 명이 AI 연구자

🔑 이 사건이 상징하는 것:
- **생명과학의 난제**를 게임과 AI를 배운 사람이 다르게 볼 수 있었다
- 단백질 접힘을 "생화학 문제"가 아닌 **"패턴 인식과 예측 문제"**로 바꿔 봤음
- *과학의 난제는 분야를 건너는 순간 새로운 입구가 열린다*

────────────────────────────

## ⚡ AI 시대 핵심 5가지 능력 [16:16]

### 1️⃣ 질문력 [16:43]

- AI는 **질문자의 수준에 맞춰** 답을 내놓음 → 질문이 흐리면 답도 흐림
- ❌ "과학 알려줘" → ✅ "중학생에게 상대성이론을 설명해야 하는데 시간 지연을 기차 비율로 설명하고, 확인 질문 3개 만들어 줘"
- ❌ "보고서 써 줘" → ✅ "내 주장의 핵심은 이건데, 논리의 빈틈 찾고 반대 입장 질문 5개 만들어 줘"

> __**프롬프트는 마법 주문이 아니라, 사고의 지도를 그리는 것이다.**__

- 질문력 = 내가 무엇을 알고 모르는지, 무엇을 알고 싶은지를 **파악하는 힘**
- AI와의 대화는 주문이 아니라 **대화** — 계속 고쳐 나가는 과정

────────────────────────────

### 2️⃣ 연결력 [18:47]

- 하사비스: AI 도구 + 단백질 구조 문제 연결
- AI 시대 강한 사람 = **서로 멀어 보이는 것들을 연결**하는 사람
  - 과학 ↔ 예술, 수학 ↔ 시, 생물학 ↔ AI, 게임 ↔ 학습
- 프리렌의 수많은 마법 중 *언제 어떤 마법을 쓸지* 결정하는 건 제자 페른 — AI의 지식을 어떤 현실에 연결할지는 **인간의 몫**

### 과거 교육 vs AI 시대 교육 [19:49]

- **개인 간 경쟁 (1등, 100점)** — AI 시대: 함께 문제를 푸는 협업

- **한 분야 전문성** — AI 시대: 분야 간 경계에서 새로운 것 발견
- **잘 외우는 사람** — AI 시대: **잘 연결하는 사람**

- 기후위기·감염병·AI 안전성 등 현대 난제는 **여러 분야의 협업**으로만 해결 가능
- AI는 서로 다른 분야의 언어를 번역하고, 자료 정리·빈틈 지적을 도울 수 있음 — 그러나 **최종 결정은 인간**

────────────────────────────

### 3️⃣ 검증력 [22:27]

> "AI 시대에는 아는 사람이 아니라 **확인하는 사람**이 강하다."

- AI는 그럴듯하게, 자신 있게 틀림
- AI를 맹신하는 사람 ❌ → AI와 함께 **집요하게 확인**하는 사람 ✅
- 습관적으로 달아야 할 질문들:
  - 근거가 뭐야? 출처가 뭐야?
  - 반대되는 연구나 견해 있어?
  - 정보 기준 시점이 언제야?
  - 불확실한 부분이 어디야?

────────────────────────────

### 4️⃣ 맥락력 [23:00]

- AI가 준 답이 초등학생에게 필요한 건지, 전문가에게 필요한 건지, 정책 결정권자에게 맞는 건지 — **맥락에 따라 지식의 의미가 달라짐**
- AI가 만들어낸 결과는 **맥락 속에 놓여야** 비로소 가치가 생김

────────────────────────────

### 5️⃣ 목적력 [23:31]

- __**AI는 방법은 주지만 목적을 정하지 않는다 — 목적은 인간이 정한다**__
- AI가 글·계획·코드를 만들어 줄 수 있어도, *왜 이걸 해야 하는지*는 인간의 영역

🗡️ 극중 사례: 2024년 대만 무차별 칼부림 사건에서 얼굴이 찢어지면서도 범인을 잡아 사망자 0명으로 만든 시민 — "**용사 힘멜이라면 그렇게 했을 것이다**"

> "우리가 어떤 목적으로 AI를 활용할지가 중요하다. 인간의 공부는 기계와 경쟁하기 위한 훈련이 아니라, **인간이 자신의 삶의 의미를 잃지 않기 위한 훈련**이다."

- 자동차가 나왔다고 육상 선수들이 자동차를 이기려 하지 않음
- 교육의 최종 목적: **기술을 잘 쓰는 사람**을 넘어 → **기술을 인간답게 쓰는 사람**을 만드는 것

────────────────────────────

## 🛠️ 실전 공부법 5단계 (프리렌식) [27:42]

### 1단계: 모르는 걸 부끄러워하지 말 것 [28:00]

- AI는 같은 걸 열 번 물어봐도 되고, 처음부터 다시 설명해 달라고 해도 됨
- AI = **모르는 걸 말하는 안전한 연습장** → 교육적으로 매우 중요

### 2단계: 답이 아니라 과정을 물어라 [28:43]

- ❌ 수학 문제 사진 찍어 "다 풀어 줘"
- ✅ "정답은 말하지 말고 힌트 하나만 줘" → "내 풀이 어디서 틀렸는지 찾아줘" → "비슷한 문제 하나 만들어 줘"

> __**AI에게 결과를 맡기면 편해지지만, 과정을 맡기면 성장한다.**__

### 3단계: 다른 관점을 요구하라 [30:20]

- SNS 알고리즘은 동조하는 의견만 보여줌 → AI로 의도적으로 반대 관점 훈련
- 활용 예시:
  - "내 주장에 반대하는 입장 꺼내 봐"
  - "이 문제를 과학자·교사·학생·부모·정책가 관점에서 각각 봐줘"
  - "내가 놓친 위험성이 뭔지 찾아줘"
  - "전혀 다른 분야의 비유로 말해 줘"

> "공부는 같은 자리에서 쌓는 게 아니라, **계속 자리를 옮겨 보는 것**이다. 관점을 바꾸면 문제 모양이 바뀐다."

### 4단계: 검증을 습관으로 [31:23]

- AI는 없는 출처도 가짜로 만들어냄
- 모든 AI 사용 시 입버릇처럼: 근거? 출처? 반대 견해? 정보 기준 시점? 불확실한 부분?

### 5단계: 인간에게 써야 한다 [32:25]

- 좋은 보고서·코드·그림 만들었다 → 마지막 질문: **"그게 누구에게 도움이 되는가?"**

- 마법을 배운 의미는 *그 마법이 누군가의 삶에 닿을 때* 생김
- AI로 배운 지식도 마찬가지: **누군가에게 닿을 때 진짜 공부**가 됨

────────────────────────────

## 🔮 교육의 미래와 마무리 [34:00]

### AI 금지보다 AI 사용법 교육 [34:00]

- "숙제 손으로 써야지" → 지금은 다 출력함 — AI도 마찬가지 과도기
- 중요한 건 **"AI를 쓰냐 마냐"가 아니라 "AI를 어떻게 쓰게 가르칠 것인가"**

아이들에게 가르쳐야 할 것:
- AI에게 답만 받지 말고 **설명을 요구**해라
- AI 답을 그대로 베끼지 말고 **너의 언어로 바꿔**라
- AI 답에서 **틀린 부분을 찾아봐라**
- AI에게 **반대 의견을 물어봐라**
- AI와 대화한 **과정을 남겨라**

### 미래 숙제 형태 [35:03]

- ❌ "보고서 써 오세요" (AI가 몇 초 만에 씀)
- ✅ "AI와 대화하면서 초안 만들고, 어디를 어떻게 수정했는지 설명하세요"
- ✅ "AI가 제시한 풀이 중 틀린 부분 찾아 고치세요"
- ✅ "AI의 주장과 반대 주장 비교해서 본인 입장 세우세요"

### 선생님의 역할 변화 [36:05]

- AI(프리렌): 지식 전달의 두 번째 선생님
- 인간 교사: 학생이 *왜 질문을 두려워하는지, 왜 자신감을 잃었는지, 왜 연결하지 못하는지* — 이건 AI가 볼 수 없음
- **첫 번째 선생님은 여전히 인간**이어야 함

### 공부의 의미 변화 [38:40]

- **더 많이 외우기** — AI 시대: **더 많이 잘 묻기**
- **정답을 빨리 찾기** — AI 시대: **정답을 검증하고 연결하기**
- **혼자 똑똑해지기** — AI 시대: **함께 문제 풀기**
- **지식을 소유하기** — AI 시대: **지식을 인간적으로 사용하기**

> "AI는 우리의 프리렌이 될 수 있다. AI는 오래 사는 마법사, 우리는 짧게 사는 제자. 그러나 여행의 목적지는 언제나 **제자가 정해야** 한다."

> __**가장 중요한 것은 AI가 얼마나 똑똑한가가 아니라, 우리가 얼마나 좋은 질문을 품고 살아가느냐다.**__

## 💡 핵심 정리
> - **AI는 프리렌**: 수천 년치 지식을 쌓았지만, 지금 이 순간 '왜·누구를 위해·어떻게'는 인간(제자)이 정한다
> - **공부 = 지식 축적 → 질문하는 힘**: 무엇을 알고 모르는지 파악하고, 좋은 질문을 던지는 능력이 핵심
> - **리온 프라이스 & 하사비스**: 비전공자도, 분야를 넘나드는 연결과 질문으로 60년 난제·노벨상에 닿을 수 있다
> - **AI에게 결과를 맡기면 편해지고, 과정을 맡기면 성장한다** — 숙제·공부 모두 *과정 중심*으로 활용할 것
> - **교육의 최종 목적**: 기술을 잘 쓰는 사람 → *기술을 인간답게 쓰는 사람* — AI가 방법을 줄 때, 의미와 목적은 인간이 품는다
