# TL;DR
서울대 의대 출신 안무역 대표가 6년간의 시행착오를 거쳐 병원 리뷰 플랫폼 '모두닥'을 연매출 70억 규모로 성장시키기까지의 과정과, 그 속에서 깨달은 사업의 핵심 원리를 이야기해요.

---

## 모두닥 소개 [00:31]

안녕하세요. 저는 모두닥 대표 안무역이에요. 모두닥은 **병원의 가격 정보 그리고 의사의 투명한 리뷰**를 볼 수 있는 서비스예요. 우리가 병원을 갈 때 내가 어떤 의사한테 진료 받을지 모르고, 실제로 그 의사한테 진료 받았던 사람들한테서 솔직한 후기를 듣고 싶은 경우들이 많다고 생각했어요. 병원의 솔직한 리뷰를 볼 수 있는 서비스로 시작했다가, 4년 전부터 큰 피봇을 거쳐서 지금까지 이어왔다고 말씀드릴 수 있을 것 같아요.

모두닥은 **2023년도에 연매출 10억**을 시작으로 **24년도에는 27억**, 올해는 **70억 원을 넘김으로써 매년 세 배씩 성장**하는 서비스예요.

> "될까 생각하지 말고 어떻게 되게 할까를 고민하려고 스스로 다그치고 있습니다."

---

## 의대에 간 이유 [01:34]

사실 의사가 되고자 하는 마음이 있었던 건 아니었어요. 부모님들은 자식이 전문 직종에 종사하는, 안정적인 직업을 갖는 걸 원하잖아요. 저희 부모님도 그러셨어요. 특히 저희 어머니가요. "네가 공부를 잘하고 수능을 잘 보면 서울대학교 의과대학 가면 좋지 않겠냐?"라는 이야기를 듣게 되면, 제가 거기에 왜 가야 되는지에 대한 깊은 고민 없이 "나는 거기 가면 되겠네"라고 생각이 이어졌던 것 같아요.

---

## 의대 시절, 사업에 눈을 뜨다 [02:05]

의대에 들어가서는 신나게 소개팅·미팅 하고, 다른 과 학생들과 섭(MT 등의 모임)에 들면서 술 먹고 토하고 난리치는 의대생 중 한 명이었어요. 중앙 동아리를 많이 들기 시작했는데, **'부자동아리'**라는 곳이 있었어요. 경제적인 자유를 어떻게 도달할 수 있을까를 고민하는 동아리였는데, "부자가 되는 건 뭘까?" 하면서 들어갔죠.

함께했던 형 중 한 분이 한국에서 꽤 유명한 떡을 파셨는데, 그때 당시에는 그 정도로 유명하지 않았어요. 부자동아리 동기이다 보니까 "우리 한번 떡을 잘 팔아 볼까?" 해서 **서울대 정문에서 떡을 엄청 많이 쌓아두고** 걸어 들어가는 등산객들한테 열심히 팔아봤어요. 관악산이 있다 보니까요. 근데 잘 안 팔리고 속상한데, 셔틀버스가 지나가는데 의과대 친구들이 가득 탄 버스가 지나가면서 "쟤는 왜 저기서 뭔 뻘짓을 하고 있어" 하더라고요.

그런데 저는 그게 되게 재밌었어요. 뭔가 **사람들한테 필요한 무언가를 설득해서 팔아가는 과정**이라든가, 그 과정에서 이익을 내는 사업의 전반적인 부분을 경험했고, 그때 흥미를 가졌던 것 같아요.

---

## 첫 번째 창업: 만성질환 환우 사이트 [03:06]

첫 번째 창업은 되게 우연한 기회였어요. **PatientsLikeMe**라고 하는 만성질환 환우 사이트를 만든 설립자가 와서 이야기를 공유하는 시간을 가졌는데 되게 충격을 많이 받았어요. 류머티스 관절염 같은 불치병을 앓는 사람들이 있는데, 의사들도 불치병이다 보니까 새로운 약을 어떻게 처방할지를 모르게 돼요. 그러면 이 사람들이 어떻게 하냐면, 내가 먼저 약을 처방받거나 필요한 치료를 받고 "이런 새로운 신약들이 나왔는데 너희 나라에서 한번 트라이해 봐"라고 공유하는 거예요.

보통 의사들이 결정을 다 하고 환자들이 배제되는데, **이 결정이 환자 주도적일 수도 있겠다**는 생각을 했어요. 그러면 어떻게 이걸 바꿀 수 있을까? 제로부터 고민해서 만들어진 무언가가 필요하다. 그게 저는 결국 스타트업이었던 것 같아요.

제가 개발을 당장 할 순 없다 보니까 **컴퓨터공학부 행정실에 무작정 전화**를 해서 자초지종을 다 설명했죠. 불쌍하게 생각하셨던 것 같아요. 서울대학교 컴퓨터공학부 학생들이 활발하게 사용하는 게시판이 있는데 본인이 올려 주겠다고 하셨어요. 다섯 분 정도가 연락이 오셔서 한 분과 최종적으로 함께 사이트를 만들어 보자고 뜻이 투합하게 됐죠.

약간 롤러코스터 타는 기분이었어요. 제품이 완성되는 기미가 보이거나 디자인이 예쁘게 나오거나, 그런 변곡점들이 등장하면 "아 그래도 내가 잘 가고 있구나" 하면서 힘을 얻다가도, 이게 정말 임팩트를 내고 있나 하면 또 그건 아닌 거죠. "내가 뭐 하는 거지?" 하는 거예요. 저는 이게 필요하다고 생각해서 만들었는데, **류머티스 관절 환자들은 진짜 필요하지 않았던** 거죠. 되게 뭔가 단단히 잘못됐다는 생각이 들었어요. 결과적으로 동아리 활동처럼 적당한 퀄리티로 만들다가 결국 접었어요.

---

## 군 복무와 조급함 [04:38]

대한민국 남자라면 군복무를 해야 하기 때문에, 레지던트·인턴 같은 수련의 과정을 거칠 생각은 전혀 없었기에 이 부분부터 빠르게 해결하고 싶었어요. 창업을 하면서 되게 하드코어하게 살다가 긴 휴식을 좀 가졌던 것 같아요.

어쨌든 창업의 길을 다시 가고 싶었던 상황이기 때문에 3년 동안 못 한다는 게 되게 아쉬웠고, 특히 그때가 **카카오톡이 막 뜨던 때**였어요. 병원 관련 앱들도 나오기 시작했어요. "나도 이런 컨셉의 앱을 내고 싶었는데, 누군가 출시를 시작하고 있구나." 그런 생각을 하면서 마음이 좀 조급했던 것 같아요. "나도 이걸 만들고 나도 빨리 세상에 내보이고 싶은데…"

---

## 모두닥 창업 — 초기 테스트 [05:38]

전역한 시점은 **2016년 5월**이었고, 바로 창업을 했어요. 관악구청 맞은편에 있는 오피스텔에서요. 의대생 때 진행했던 창업 경험을 돌아보며, 사람들이 정말 필요로 하는 서비스를 한번 간단하게 테스트해 보자고 했어요.

**스노우라이프**(서울대 커뮤니티)에 글을 하나 작성했어요. "서울대학교 학생 여러분, 서울대입구역 주변 혹은 낙성대역 주변에 있는 진료과 병의원들의 후기를 솔직하게 남겨 주세요. 다른 학우분들이 아플 때 큰 도움이 될 것 같습니다." 그때 반응이 되게 좋더라고요. 서울대입구역하고 낙성대역에 있는 병원 몇 개를 등록해 놓고, 그냥 들어가서 리뷰를 쓸 수 있게 했는데 **최소 200개 넘게** 리뷰가 달렸어요. 서울대학교 학생들조차 어느 병원을 갈지 고민하는구나 하는 걸 알게 됐고, 이걸 계속 이어가고 싶다는 생각을 했어요.

---

## 삽질의 시작: 페레로로쉐와 손편지 [06:09]

지금 생각하면 참 필 꽂히는 대로 사업을 운영했던 것 같아요. **가판대를 열어서 페레로로쉐를 깔고** "이거 설치하고 가입하면 바로 페레로로쉐 줄게." 그렇게 해서 서울대학교를 누비면서 거의 수백 명, 수천 명을 가입시켰는데 **활동이 거의 안 일어나더라고요.** 리뷰도 거의 작성이 잘 안 되고. 그러면서 느꼈죠. "아, 이게 쉽지 않구나." 병원은 자주 가는 곳이 아니다 보니까.

정말 나중에는 절박한 심정으로 **제 방에서 손편지 쓰기를 시작**했어요. 우편함에 넣으면 우리의 정성이 전달되어서 쓸 거야, 하는 마음으로요. **수백 통 쓰는 데 며칠이 걸렸던** 것 같아요. 그렇게 삽질을 하다가 같이 사업했던 친구가 이런 말을 하더라고요. "우리 이렇게 계속 가면 안 될 것 같아. 우리 제대로 하는 거 맞아?"

우리가 정말 미숙하다는 생각이 들었고, 되게 잘하는 사람들의 도움이 필요한 걸까? 해서 **프라이머**(초기 스타트업 액셀러레이터)에 지원하게 됐고 운 좋게 선발이 됐어요.

---

## 프라이머와 영수증 인증 리뷰 [06:40]

그때 당시에 **권도균 대표님**이 "진짜 하나를 제대로 하는 게 더 중요하지 않냐. 리뷰를 정말 집중해서 믿을 수 있는 리뷰를 잘 모아본다면 이거는 해 볼 만하지 않을까"라고 해 주셨어요. 그럼 한번 리뷰에 올인해 봐도 되겠다라고 생각했어요.

정말 사람들이 다녀간 걸 증빙하려면 어떤 증빙이 필요할까? 결국 우리가 어디를 가도 결제를 하면 **영수증**이 나오잖아요. 그럼 **영수증을 받아서 인증시키면 정말 믿을 수 있는 리뷰**이지 않을까? 그때부터 영수증 인증 리뷰를 집중적으로 모으기 시작했죠.

---

## 200만 MAU, 그런데 매출은… [07:12]

초창기 4년 동안 **수십만 개 리뷰**를 모았어요. 처음에 3,000명에서 5,000명이던 **월간 활성 이용자 수(MAU)가 200만이 넘었어요.** 이제는 과금을 붙여서 매출을 일으킨다면 정말 우리가 원하는 매출 성장을 만들어 낼 수 있을 거라는 믿음과 희망을 가졌죠.

**실제로 뚜껑을 까 보니까 월 매출액이 수천만 원 수준인 거예요.** 큰 사이즈로 성장할 수 있는 기미는 전혀 보이지 않았어요.

"모두닥이 정말 풀고자 하는 문제는 뭐야? 모두닥이 필요로 하는 고객은 정말 구체적으로 어떤 페르소나를 갖고 있어?"라고 물었을 때 "대한민국 국민 전부요"라고 이야기할 수밖에 없는 거예요. 그게 자연스럽게 매출로 이어지지도 못하는 거고, **깊이가 없는** 거죠.

> **"사실 확장은 쉽거든요. 근데 밀도 있게 만드는 건 되게 어렵더라고요."**

너무 넓은 범위가 아니라 정말 하나를 제대로 뒤집어서, "얘네 진짜 이렇게까지 판다고?" 라는 이야기를 들어야 되는 건가 싶었어요.

---

## 안과·시력교정이라는 돌파구 [08:14]

저희가 광고를 붙이면서 특가로 상담을 신청하거나 예약할 수 있는 기능을 도입했어요. 여러 진료 과목을 다 뜯어보고 예약이나 신청이 늘어나는 추이를 봤더니, 어느 한 진료 과목이 유독 빠르게 성장하고 있더라고요. 저희도 모르는 사이에 **거기가 바로 안과, 시력교정술**이었던 거죠. 우연이었어요.

대학생들이 시력교정수술을 많이 알아보다 보니까 유독 대형 안과들의 리뷰가 정말 많이 쌓였어요. 그 리뷰를 보러 오는 대학생들·직장인들이 많아졌고, 자연스럽게 모두닥에서 예약하는 수도 늘었죠. 안과들 사이에서도 "모두닥을 통해서 시력교정을 알아보는 분들이 많으니 여기 한번 광고해 보면 좋겠네"라는 입소문이 나게 됐고, **매년 두 배 이상씩** 늘었어요.

---

## 서울대 축제에서 초기 유저 모으기 [08:46]

초기 유저를 어떻게 모을까 고민하던 차에 서울대학교에서 메일이 날아왔어요. 축제에 참여할 기업을 모집한다고요. "여기 해보자" 해서 갔죠.

데이터를 보니까 우리 서비스를 많이 사용은 하는데, **정보만 얻고 예약을 안 하더라고요.** 이 문제를 어떻게 풀 수 있을까 고민하던 시기였어요.

목표는 서울대 3만~4만 명 정도 되는 재학생들을 거의 다 가입시키면, 우리가 원했던 10~20% 시장은 먹을 수 있지 않을까 하는 거였어요. 일단 **가입자 수를 미친 듯이 모아보자.** 첫 번째 날은 진짜 미친 듯이 모았고, 두 번째 날은 비가 미친 듯이 왔어요. 어떻게든 가입시켜야 되니까 앞뒤로 패널 붙인 다음에 전단지 나눠 주면서 "원플러스원, 가입하면 메가커피 준다, 제발 가입해 달라" 하면서 옆에서 지켜보고 "진짜 감사해요 감사해요" 하면서 가입시켰거든요.

공대에 찾아갔었는데 **진짜 아무도 말을 안 받아 주는 무서운 곳**이었어요. 너무 자존심이 상해서 **가위바위보를 문 앞에서 시작**했어요. 지면 가입을 안 하시고, 제가 이기면 가입해 주시고 커피 쿠폰 얻어 가시고. 저는 약간 거기서 호객꾼 1인이었거든요.

## PMF(Product-Market Fit)를 느낀 순간 [10:21]

예상했던 3,000명 가입 후에 단기적으로 **신청이 일어나는 거예요.** 그리고 신청한 사람들을 인터뷰했을 때, "주변 사람들에게 이 제품 얼마나 추천해 주고 싶어요?"를 5점 만점으로 물어봤는데, **대부분 다 4점, 5점**을 이야기하는 거예요. 이전에 만들었던 어떤 제품에서 이 질문을 하면 다 "3점 정도" 같은 보통 수준의 답변이었거든요. 근데 이 제품은 **"추천할 것 같다"라고 강력하게 말**하는 거예요. 그래서 "아, 이거는 PMF가 맞는 것 같다"라는 감이 왔었어요.

## 조직 문화의 변화 — "빡세게 일하자" [10:52]

그 이후에 저는 모두닥 팀이 **정말 더 허슬링(hustling)하고 더 빡세게 일하는 문화로 바뀌어야 된다**는 생각이 들었어요. 제가 정말 빡세게 일하는 건 쉽다고 생각했어요. 근데 이걸 같이 하는 팀원들에게 "이 정도의 완성도로 더 집착해서 더 만들어야 돼"라고 말하는 건 저도 처음 해 본 적이 없는 일이더라고요.

저 스스로도 매너리즘에 있었던 것 같아요. 그래서 매너리즘을 깨고 진짜 **"이 순간 내가 죽는다면 후회하지 않으려면 어떤 태도를 가지고 해야 될까"**를 고민했어요. 아무리 최악이라 해도 죽기보다 더하겠어요? 모두닥에서 정말 최악은 뭘까? **저 혼자 남는 상황**일 것 같고, 그럼 내가 혼자 남아도 이걸 계속 이어갈 수 있을까? 근데 답은 **예스**였어요. 내가 그 상황을 두려워하지 않고 나아갈 수 있다면, 이 변화를 적극적으로 가져갈 수 있겠네라는 생각을 하는 데까지 시간이 좀 걸렸던 것 같아요.

## 휴가 복귀 후 팀원 이탈 [11:53]

리프레시 휴가가 3년 차에 2주가 나와서 다녀왔는데, **돌아와 보니 분위기가 완전히 뒤바뀌어 있는 거예요.** "나는 단지 2주 휴가를 갔다 온 것뿐인데 왜 이렇게 분위기가 달라졌지?" 하고 당황스러웠어요. 가기 직전에 같은 팀원분과 "다음에 우리가 어떻게 잘해 보자"라고 도모하고 갔었거든요. 근데 돌아온 당일 첫날에 **그 팀원분이 오셔서 그만두게 됐다고** 하시는 거예요. "이게 무슨 일이지?"

## 이터레이션 속도 극대화 [12:25]

제품팀은 일단 **두세 명 단위로 잘게 나눴고요.** 2주에 하나의 기능을 배포했던 수준의 이터레이션 속도였다면, **일주일 혹은 3일에 한 팀이 그 분량을 다 하도록** 듀티를 설정하고 "우리 빠르게 실험해서 가설을 검증하자"라고 해서 속도를 거의 **두 배에서 다섯 배 이상** 높였죠.

사실 집에 가서 어떻게 잠들었는지 기억 안 날 정도로 하루가 굉장히 빡빡한 날이 많았어요.

## 동료들의 줄퇴사, 그리고 대응 [12:57]

저의 동료들이 **줄퇴사**를 하기 시작했어요. 한 분은 제가 진짜 구질구질하게 붙잡았어요. "매일매일 커피 사 줄 테니까 내일도 다니는 거 어때? 맛있는 거 사 줄 테니까 다음 달에도 다니는 건 어때?"

조직이 이렇게 급변하고 CEO 의지가 강력할 때, HR 담당자는 선택지가 없다고 생각해요. 가장 큰 문제는 **남아 있는 구성원들에게 끼치는 영향**이잖아요. 전체적으로 업무 몰입도 자체가 당연히 깨질 수밖에 없고, 그래서 **최대한 솔직하게 커뮤니케이션하려고 노력**했어요. "이런 이유로 인해서 이렇게 하게 됐다"라고요.

## 의사결정 기준의 단순화 — "매출을 낼 수 있냐 없냐" [13:27]

**의사결정의 기준이 엄청 단순해졌어요. "이거 매출을 낼 수 있냐 없냐"**로요. 임팩트를 종합적으로 고려하다 보면 가설도 뾰족하지 못하고 임팩트도 애매한 실험들이 많았는데, 매출을 낼 수 있냐 없냐만 따지다 보니까 자연스럽게 집중해야 될 고객이 재정의됐어요.

> **"고객이 진짜 이 서비스를 이용한다고 하는 건 결국 돈을 내는 거더라고요. 사람들이 편하게 '이 서비스 좋아요'라고 말은 하지, 진짜 좋으면 사거든요."**

저희 고객, 돈을 내시는 분은 병원이잖아요. 그럼 병원들에게 우리가 정말 돈을 내고 싶은 서비스가 무엇인지를 재정의할 수 있게 되더라고요. **내가 얼마만큼 내는 게 합리적인지를 결국 맞춰 가는 과정**을 더 집요하게 파고 들었어요. "왜 이 사람은 돈을 낼까? 왜 만족할까? 만족하는 포인트는 뭔지"를 캐치하는 거죠. 그럼 **그걸 되게 강화시켜요.**

팬시하게 보이지 않을 수 있지만, 사업이라는 건 결국 사람들이 정말 필요로 하고 정말 가치를 주는 게 더 중요하다고 생각해요. 그래서 이제는 **사람들이 정말 기꺼이 돈을 쓸 정도로 정말 필요한가?** 거기에 좀 더 집중하게 됐어요.

## 세일즈 현장 — 병원 영업의 현실 [14:59]

저는 무조건 **8시 이전에 출근**하는 편이에요. 일이 많으면 7시. 하루의 절반 이상이 **병원 응대**예요. 9시간 근무한다고 쳤을 때 네다섯 시간은 문의 처리하는 데 굉장히 시간이 많이 쓰거든요.

문의 내용이 "저희 성과를 더 내고 싶은데 어떻게 해야 될까요? 지금 뭔가 잘 안 되고 있는 것 같은데 뭐가 문제일까요?" 이런 거예요. 가볍게 1~2분 만에 처리할 수 있는 문의가 아니어서, 거기에 굉장히 많은 시간을 쓰고 응대하고 답변하는 게 **또 세일즈로 직결**되거든요.

## 광고주 영업 — 쓰레기통에 버려진 자료 [16:03]

처음에 광고주 수를 늘리자라고 했을 때 **강남에 있는 모든 안과한테 전화를 돌렸어요.** 근데 아무도 안 받으시고, "모두닥인데요"라고 하면 바로 끊으시거나… 이러면 광고주 수를 못 늘리겠다 싶어서 자료를 뽑아서 **직접 병원에 갔어요.** 환자인 척 앉아 있다가 "원장님 뵈러 왔다"라고 하면 간호사분들이 당황하시죠. 약속하고 오신 줄 알고. 원장님을 마주쳤는데 원장님이 "아 그래요, 읽어 볼게요" 하고 자료 받으시더니 **바로 쓰레기통에 넣으시는 거예요.**

근데 읽어 보지도 않는 이유가 너무 궁금해서 좀 자주 연락을 계속 드렸어요. "읽어 보셨나요?" 그러다가 **한 1년 뒤에 다시 연락 오셔서 광고 한번 해 보겠다**고 하셨죠.

## 세일즈 담당자의 철학 [17:06]

> "저는 항상 대표님한테도 같은 말씀을 드리거든요. **재미 없으면 당장 내일도 나갈 거예요.**"

제가 이런 걸 기획하는 것도 재밌고, 제 설득으로 광고주가 이걸 사용해서 효과를 많이 보는 것도 너무 재밌어요. 이렇게 만들어진 상품을 회원들이 더 많이 이용하는 것도 재밌어요. 이 과정을 통해서 동료들이 너무 힘들게 만들어 놓은 제품이 인정을 받는다는 거, 약간 최고의 환경이라고 생각하거든요.

"조금만 더 하면 더 잘 될 수 있고, 더 많은 사람들이 이 서비스를 이용할 수 있는데 왜 더 안 해야 되지?"

병원 방문 영업도 원래 많으면 여섯 개, 적으면 다섯 개, 한 번 나올 때 싹 방문하고 돌아가는 편이에요. 매일 서너 시간씩 쓰는 것보다 **하루 통으로 9시간 정도** 쓰고 진행하는 게 나을 것 같아서요.

## 적은 인원, 더 많은 사업부 [18:08]

되게 역설적으로 들릴 수 있지만, 오히려 **팀원 수는 거의 절반 수준으로 줄어들었는데 사업부 수는 거의 세 배로 늘었어요.** "말이 되냐"라고 하실 수 있는데, 예를 들어 제품 개발팀이 보통 다섯 명에서 여섯 명으로 구성되는 게 일반적이잖아요. 그렇게 많이 구성될 필요 없이 **두 명이면 충분히 더 빠르게 검증하고 매출도 일으킬 수 있고**, 그런 사업을 빠르게 검증해 나갈 수 있더라고요. 만약 이 사업이 정말 충분히 수익성이 있고 충분히 스케일러빌리티(확장 가능성)가 있다고 판단되면 사람을 채용해서 나가면 되는 거고요.

> **"팀원 수가 많은 게 중요한 게 아니라, 오너십을 가지고 어떻게든 되게 만들고 싶다는 열망을 가진 팀원이 있느냐가 중요한 거지, 팀원이 몇 명이 빵빵하냐는 아닌 것 같다."**

중요한 건 **그 기준을 타협하지 않고 낮추지 않는 것**이에요. 같이 일할 때 "와 이 사람은 어떻게 이렇게까지 생각할 수 있지? 이렇게까지 행동할 수 있지?" 하는 생각이 드는 사람이면 **사실 하루만 일해도 알거든요.** 그 부분 되게 노력을 최근 들어서 많이 하고 있어요.

## 시니어(어르신) 팀의 탄생 [19:43]

시니어팀 PO(Product Owner)로 일하고 있는 팀원 이야기예요. 50·60·70대 분들이 의료 서비스를 잘 받으실 수 있도록 서비스를 런칭하고 개선하고, 어르신 분들 만나고, 이런 전반적인 작업을 하고 있어요.

이 팀원은 간호학을 전공했고, 국제 보건 사업에 관심이 있었어요. 특정 국가의 문화에 맞는 보건 사업을 진행하는 게 재밌을 것 같아서 글로벌 의학 센터에서 보조 연구원으로 일했고요. 해외 사업을 본격적으로 하려는 시점에 갑자기 **코로나가 터졌고**, 그러면 이 타이밍에 차라리 병원 임상 경험이 있으면 좋지 않을까 싶어 서울 삼성병원에 취업했어요. 그런데 코로나 시기가 길어지면서 바로 발령 받을 수 있는 상황이 아니었고, 평소 관심 있었던 스타트업 쪽에서 일해 볼 수 없을까 하다가 모두닥 인턴으로 합류하게 됐어요.

## 시력교정에서 백내장으로 — 시니어 시장 발견 [20:45]

맨 처음에 시니어 팀을 맡았던 건 아니었어요. 시력교정수술 유입을 더 늘리고 싶어서, 자체 유튜브 콘텐츠를 만들면서 실험을 해 보자는 이야기가 됐었어요. **시니어분들이 정보를 유튜브에서 탐색하는 풀이 훨씬 더 많을 것 같다**는 게 제 생각이었거든요.

지금 이미 잘 되고 있는 라식·라섹 시장이 아니라, 구매가 아직 이루어지지 않는 시니어 분들을 타겟으로 해 봤을 때 얼마나 매출이 일어나는지 보는 게 더 유의미하지 않을까? 해서 **시니어 분들의 백내장 쪽을 타겟**으로 정보를 제공해 보기로 했어요.

본격적으로 백내장 수술을 공부하다 보니까, **백내장 시장이 시력교정술보다 네 배에서 다섯 배가 높은 시장**이거든요. 가격 레인지도 급여성은 80만 원인데 비급여는 800만 원, 1,000만 원까지 하는 수술이에요. 어르신 분들이 이 가격을 잘 알 수 있을까? 이 가격 차이는 결국 안에 넣는 **렌즈 차이**인데, 렌즈 이름이 클라레온, 파노픽스 같은 영어 이름이잖아요. 우리 제품에서 뭔가 잘 비교하고 선택할 수 있게 도와준다면, 유의미하게 매출을 일으켜 볼 수 있지 않을까?

---

## 시니어 유저 리서치의 어려움 [22:17]

진짜 어려운 부분들이 정말 많았어요. 설릉역 같은 곳에 나가서 어르신들 붙잡고 여쭤봤어요. "병원 어떻게 방문하세요?" 하면 "뭐 때문에 그러냐"고 하시고, "사실 백내장 관심 있으신가요? 병원 방문하는 거 도와드리려고 하는데요" 하면 **"온라인으로 누가 가냐"면서 지인 이야기만 듣고 간다**는 얘기가 진짜 많았어요. "절대 안 쓰신다고 하는데, 이걸 만들어 봤자 아무도 안 쓰시는 거 아니야?" 하는 걱정도 했죠.

사실 제가 너무 막연하게 생각했던 게, 2~30대도 시력교정을 찾는 사람도 특성이 다 다른데 **시니어를 하나의 그룹으로만 크게 생각**했던 거예요. 50대에서 70대의 **액티브 시니어**도 있을 거고, 70대 이상의 **케어 시니어**도 있을 거고. 더 타겟을 좁혀서 이분들한테 어필해야겠구나라고 생각했어요.

그런 분들을 한 분씩 모두닥을 이용하셨던 분 중에 만나 보면서, 프로토타입 같은 거 보여 드리며 "이거 어떠세요?"라고 많이 여쭤봤고, 그때 "추천할 것 같다, 너무 좋다"라는 반응들을 들으면서 **"서울대 축제 때 받았던 느낌이랑 비슷한데, 해 볼 만할 것 같은데"** 하면서 서비스를 런칭했어요.

---

## 시니어 팀의 성과 [23:18]

다행히도 이게 워킹이 되더라고요. 시니어 팀 같은 경우는 **오픈한 지 4개월도 안 돼서 월 5,000만 원 매출**을 달성할 수 있을 것 같고, **올해 안에 아마 억 단위 매출**이 될 것 같아요. 진짜 빨리 성장하고 있는데, **이 팀이 두 명밖에 없어요.**

그런 부분들을 보면서 "진짜 사람들이 꼭 많이 필요하진 않네. **정말 집요하게 뭔가를 풀어 나가고 제품을 개선하는 게 되게 중요하네**"라는 걸 느꼈어요.

---

## 새로운 사업 — 외국인 의료관광 (대만) [23:49]

최근 들어서 한국 의료를 이용하는 외국인 수가 급증하고 있어요. K팝이나 K컬처의 영향이라고 생각하는데, **60만 명**이었던 외국인 환자 수가 1년 만에 **약 119만 명**, 거의 두 배 정도 성장했어요.

이 외국인들이 한국 병원을 이용하는 과정에서 애로사항들이 많더라고요. 제가 인터뷰를 직접 하다 보니, **국가 하나를 지정해서 대만으로 정했고**, 대만 시민들이 한국에서 병원을 어떻게 더 잘 이용할 수 있을지를 고민하는 팀을 새로 꾸려서 사업을 운영하고 있죠.

---

## 되고 싶은 사람 — 번아웃 없이 문제를 해결하는 사람 [24:20]

제가 되고 싶은 사람은 **어떻게든 문제를 해결하는 사람**인데, 사실 미션이랑은 크게 관계가 없는 것 같거든요. 근데 그런 사람이 되기 위해서 제일 문제가 되는 건 뭘까 생각해 보면, **번아웃이 온다거나 중간에 포기해 버리는 것**이 제일 큰 허들이에요.

그때 저는 해결책을 **미션으로부터 찾으려고** 했던 것 같아요. "내가 하는 일이 그냥 문제를 해결하는 게 아니라 이 사회에 도움이 되는 일을 해결한다. 실체가 있는 문제를 해결하는 일을 한다"고 하면, 포기하거나 좌절하는 순간에도 조금 더 힘을 내서 다시 일할 수 있겠다고 생각했어요.

---

## 팀원들이 느끼는 모두닥 [24:52]

> "그냥 그 문제를 진짜 풀고 싶은 것 같아요."

시니어 팀은 시니어 문제를 너무 해결하고 싶고, 그게 매출이 가속화되는 게 실제로 보이고, 단 이틀 만에 기능을 만들면 그것만으로 **매출이 일주일에 몇백만 원씩 더 올라가는** 게 보이니까 사실 재밌잖아요.

> "대표님이 원하는 그 방향이 너무 맞다고 생각해요. 더 많은 사람이 이 서비스를 사용해야 된다고 생각하고, **아픈 사람이 점점 많아질 텐데 그 기둥에 저희가 있었으면 좋겠고.** 이걸 한 번도 의심해 본 적이 없어요."

---

## 스페이스엑스 이야기 — 치열하게 일하고 경제적 자유도 [25:23]

제가 아는 지인 중에 한 분이 **스페이스엑스 초기 팀원**이었어요. 그 친구가 이야기하길, 스페이스엑스에서 일론 머스크가 정말 치열하게 일했던, 정말 될지 안 될지도 반신반의하던 시절을 겪으면서, 스페이스엑스가 **세 번 실패했다가 네 번째 발사를 성공**했을 때 결국 퇴사를 했고, 그때 스톡옵션을 행사했는데 그게 **100억이 넘는** 거예요.

저희도 그런 조직이고 싶어요. 치열하게 일하면서도 동시에 받을 수 있는 **경제적 자유도 확실히 얻고**, 내가 진지하게 뭘 원하는지를 고민하면서 살 수 있는 삶을 누리게 하고 싶어요. 그렇기 때문에 더 치열하게 일을 해야 된다고 생각해요.

---

## 창업을 고민하는 분들에게 [25:54]

**창업이란 길을 선택을 최대한 안 하시는 게 좋을 것 같고요.** 솔직히 하신다면 사실 진짜 각오하고 해야 되는 것 같아요. 창업이라는 게 워낙 쉽지 않은 길이고 80~90%가 망하는 게 스타트업이다 보니까, 웬만하면 안 하는 걸 추천드리고요.

하신다면 **진짜 풀고 싶은 문제를 꼭 찾았으면 좋겠어요.** "이게 정말 잘될 것 같아서"라기보다는, "누군가에게 이 문제로 고통받는 사람이 있어서 이거 내가 꼭 해결하고 싶네"라는 문제를 잘 찾으면 **끈기도 따라오고 존버(오래 버티기)도 하게 되는** 것 같아요.

근데 너무 **존버만 답이라고 생각하진 않아요.** 여러 다양한 각도로 실험을 해야 돼요. 되게 유연하게 모든 가능성을 열어두고, 내가 기존에 세웠던 가정이 완전히 무너질 수 있다 하더라도 그걸 무릅쓰고 **새로운 시도를 하는 걸 두려워하지 않았으면** 좋겠어요.

저도 되게 무서운 순간들이 있었거든요. "이렇게 해도 정말 될까? 이러면 사람들 다 떠나지 않을까?" 그래도 최악이라고 해 봤자 죽는 것보다 더하겠어요? **과감함이 필요할 때가 있어요.** 제가 과감하지 못했던 순간들이 되게 후회로 남거든요.

> **"현상 유지가 진짜 제일 해서는 안 되는 일인 것 같고, 계속 새로운 시도를 하고, 풀고 싶은 문제가 정말 간절하다면 그 문제를 계속 한증같이 붙잡아서 가신다면 무조건 길이 있을 거라고 이야기하고 싶어요."** [26:57]

# TL;DR
서울대 의대 출신 창업가 안무역 대표가 6년간의 시행착오 끝에 '밀도 있는 사업'의 원리를 깨닫고, 병원 리뷰 플랫폼 '모두닥'을 연매출 70억 규모로 성장시킨 이야기.

---

## 모두닥 소개와 핵심 철학 [00:00]

고객이 진짜로 서비스를 이용한다는 건 결국 **돈을 내는 것**이에요. "이 서비스 좋아요"라고 말은 하지만, 진짜 좋으면 사거든요. 지금 돌아보면 참 필 꽂히는 대로 사업을 운영했던 것 같아요. 가판대를 열어서 페레로로쉐를 깔고 "이거 설치하고 가입하면 바로 페레로로쉐 줄게" 하기도 했고, 정말 나중에는 절박한 심정으로 손편지 쓰기를 시작했어요. 수백 통 쓰는 데 며칠이 걸렸던 것 같아요.

처음에 3,000명에서 5,000명이던 월간 활성 이용자 수(MAU)가 200만이 넘었어요. 그런데 실제로 뚜껑을 까 보니까 월 매출액이 수천만 원 수준인 거예요. **깊이가 없는 거죠.** 사실 확장은 쉽거든요. 근데 **밀도 있게 만드는 건 되게 어렵더라고요.**

결국 사람이 정말 잘 쓰는 건 돈을 내는 것이고, 내가 얼만큼 내는 게 합리적인지를 결국 맞춰 가는 과정을 더 집요하게 파고들었던 것 같아요. **왜 이 사람은 돈을 낼까? 왜 만족할까? 만족하는 포인트는 뭔지를 캐치하고, 그걸 되게 강화시켜요.**

---

## 자기소개와 모두닥이라는 서비스 [00:31]

안녕하세요. 저는 모두닥 대표 안무역입니다. 모두닥은 **병원의 가격 정보 그리고 의사의 투명한 리뷰**를 볼 수 있는 서비스예요. 우리가 병원을 갈 때 내가 어떤 의사한테 진료받을지 모르고, 실제로 그 의사한테 진료받았던 사람들한테서 솔직한 후기를 듣고 싶은 경우가 많다고 생각했어요.

병원의 솔직한 리뷰를 볼 수 있는 서비스로 시작했다가, **4년 전부터 큰 피봇(방향 전환)을 거쳐서** 지금까지 이어왔다고 말씀드릴 수 있을 것 같습니다.

모두닥은 **2023년도에 연매출 10억을 시작으로, 2024년에는 27억, 올해는 70억 원을 넘김으로써 매년 세 배씩 성장하는 서비스**예요.

"될까 생각하지 말고, 어떻게 되게 할까를 고민하려고" 스스로 다그치고 있어요. 매출이 일주일에 600만 원씩 올라가는 게 보이니까 사실 재밌잖아요. 아픈 사람이 점점 많아질 텐데 그 기둥에 저희가 있었으면 좋겠어요.

---

## 의대에 간 이유와 창업에 눈뜬 계기 [01:34]

사실 의사가 되고자 하는 마음이 있었던 건 아니었어요. 부모님들은 자식이 전문 직종에 종사하는 안정적인 직업을 갖길 원하잖아요. 저희 부모님도 그러셨어요. 특히 어머니가 "네가 공부를 잘하고 수능을 잘 보면 서울대학교 의과대학 가면 좋지 않겠냐?"고 하시는 이야기를 듣다 보니, 왜 가야 되는지에 대한 깊은 고민 없이 "나는 거기 가면 되겠네" 이렇게 생각이 이어졌던 것 같아요.

의대에 들어가서는 신나게 소개팅, 미팅하고 다른 과 학생들과 섭(MT 같은 모임)에 드는 친구들이 많이 오면 좋아했어요. 기본적으로 섭을 다 째고, 술 먹고 토하고 난리치고. 저도 밑바닥을 깔아주는 의대생 중 한 명이었어요.

중앙 동아리를 되게 많이 들기 시작했는데, **'부자동아리'**라는 곳이 있었어요. 경제적인 자유를 어떻게 도달할 수 있을까를 고민하는 동아리였는데, "부자가 되는 건 뭘까?" 하면서 들어갔어요.

함께했던 형 중에 한 분이 한국에서 꽤 유명한 떡을 파는 분이었는데, 그때 당시에는 아직 그 정도로 유명하지 않았어요. 부자동아리 동기다 보니까 "우리 한번 떡을 잘 팔아 볼까?" 해서 서울대 정문에서 떡을 엄청 많이 쌓아두고, 관악산 등산객들한테 열심히 팔아봤어요.

근데 잘 안 팔리고 속상한데, 셔틀버스가 지나가는데 의과 친구들이 가득 탄 버스가 지나가면서 "쟤는 왜 저기서 뭔 뻘짓을 하고 있어" 이러더라고요. 그런데 저는 그게 되게 재밌었어요. **사람들한테 필요한 무언가를 설득해서 팔아가는 과정**, 그 과정에서 이익을 내는 사업의 전반적인 부분을 경험했고, 그때 흥미를 가졌던 것 같아요.

## 첫 번째 창업: 만성질환 환우 사이트 [03:06]

첫 번째 창업은 되게 우연한 기회였어요. **PatientsLikeMe**라고 하는 만성질환 환우의 사이트를 만든 설립자가 나와서 이야기를 공유하는 시간을 가졌는데, 되게 충격을 많이 받았어요.

무게릭병처럼 불치병을 앓는 사람들은, 의사들도 불치병이다 보니까 새로운 약을 어떻게 처방할지 모르게 돼요. 그러면 이 사람들이 어떻게 하냐면, 내가 먼저 약을 처방받거나 필요한 치료를 받고 "이런 새로운 신약들이 나왔는데 너희 나라에서 한번 트라이해 봐" 하고 공유하는 거예요.

보통 의사들이 결정을 다 하고 환자들이 배제되는데, **이 결정을 환자 주도적으로 할 수도 있겠다**는 생각을 했어요. 그러면 어떻게 이걸 바꿀 수 있을까? 제로부터 고민해서 만들어진 무언가가 필요하다. 그게 결국 스타트업이었던 것 같아요.

제가 개발을 당장 할 수 없다 보니까 **컴퓨터공학부 행정실에 무작정 전화**를 해서 자초지종을 다 설명했죠. 불쌍하게 생각하셨던 것 같아요. 서울대학교 컴퓨터공학부 학생들이 활발하게 사용하는 게시판에 올려주겠다고 하셨고, 다섯 분 정도가 연락이 와서 한 분과 함께 사이트를 만들어 보자고 의기투합하게 됐죠.

약간 롤러코스터 타는 기분이었어요. 제품이 완성되는 기미가 보이거나 디자인이 예쁘게 나오면 "잘 가고 있구나" 하다가도, 정말 임팩트를 내고 있나 하면 또 아닌 거죠. 내가 필요하다고 생각해서 만들었는데, **류머티스 관절 환자들은 진짜 필요하지 않았던 거예요.** 뭔가 단단히 잘못됐다는 생각이 들었어요.

결과적으로 동아리 활동처럼 적당한 퀄리티로 만들다가 결국 접었고, 군 복무를 해야 했기 때문에 — 레지던트·인턴 같은 수련의 과정을 거칠 생각은 전혀 없었기 때문에 — 일단 이 부분부터 빠르게 해결하고 싶었어요.

## 군 복무 중의 조급함, 그리고 전역 후 바로 창업 [05:08]

창업을 하면서 되게 하드코어하게 살다가 긴 휴식을 가졌어요. 3년 동안 창업을 못 하잖아요. 그게 되게 아쉬웠고, 특히 그때가 카카오톡이 막 뜨던 때였어요. 병원 관련 앱들도 나왔어요. "나도 이런 컨셉의 앱을 내고 싶었는데 누군가 출시를 시작하고 있구나." 마음이 좀 조급했어요.

**전역한 시점은 2016년 5월이었고, 바로 창업을 했어요.** 관악구청 맞은편에 있는 오피스텔에서요.

의대생 때 진행했던 창업에서 배운 게 있어서, 정말 사람들이 필요로 하고 원하는 서비스를 간단하게 테스트해 보기로 했어요. **스노우라이프**(서울대 커뮤니티)에 글을 하나 작성했어요. "서울대학교 학생 여러분, 서울대입구역·낙성대역 주변 병의원들의 후기를 솔직하게 남겨 주세요. 다른 학우분들이 아플 때 큰 도움이 될 것 같습니다."

그때 반응이 되게 좋았어요. 서울대입구역과 낙성대역에 있는 병원 몇 개를 등록해 놓고 리뷰를 쓸 수 있게 했는데, **최소 200개가 넘었어요.** 서울대학교 학생들조차 어느 병원을 갈지 고민하는구나. 이걸 계속 이어가고 싶다는 생각을 했어요.

## 초기 삽질: 페레로로쉐 전략과 손편지 전략 [06:09]

지금 돌아보면 참 필 꽂히는 대로 사업을 운영했던 것 같아요. 가판대를 열어서 페레로로쉐를 깔고 "이거 설치하고 가입하면 바로 페레로로쉐 줄게" 했어요. 그렇게 서울대학교를 누비면서 거의 수백 명, 수천 명을 가입시켰는데, **활동이 거의 안 일어나더라고요.** 리뷰도 거의 작성이 안 되고. 그러면서 느꼈죠. "아, 이게 쉽지 않구나." 병원은 자주 가는 곳이 아니다 보니까 어떻게 시작해야 되지? 지금 우리가 가는 길이 맞나?

정말 나중에는 절박한 심정으로 제 방에서 **손편지 쓰기를 시작했어요.** 우편함에 넣으면 우리의 정성이 전달돼서 쓸 거야, 라고 생각하면서요. 수백 통 쓰는 데 며칠이 걸렸어요.

그렇게 삽질을 하다가 같이 사업했던 친구가 이런 말을 하더라고요. **"우리 이렇게 계속 가면 안 될 것 같아. 우리 제대로 하는 거 맞아?"** 우리가 정말 미숙하다는 생각이 들었고, 되게 잘하는 사람들의 도움이 필요한 걸까? 하는 생각이 들었어요.

## 프라이머 합류와 영수증 인증 리뷰의 시작 [06:40]

그래서 **프라이머**(초기 스타트업 액셀러레이터)에 지원하게 됐고, 운 좋게 선발됐어요. 그때 당시 권도균 대표님이 **"진짜 하나를 제대로 하는 게 더 중요하지 않나? 리뷰를 정말 집중해서 믿을 수 있는 리뷰를 잘 모아본다면 해볼 만하지 않을까"**라고 해 주셨어요.

그럼 한번 리뷰에 올인해 봐도 되겠다고 생각했어요. 그러면 정말 사람들이 다녀간 걸 증빙하려면 어떤 증빙이 필요할까? 결국 우리가 어디를 가도 결제를 하면 영수증이 나오잖아요. **영수증을 받아서 인증시키면 그건 정말 믿을 수 있는 리뷰이지 않을까?**

그때부터 **영수증 인증 리뷰**를 집중적으로 모으기 시작했죠.

## MAU 200만, 그러나 매출은 수천만 원: 깊이의 부재 [07:12]

초창기 4년 동안 수십만 개 리뷰를 모았어요. 처음에 3,000~5,000명이던 월간 활성 이용자 수가 **200만이 넘었어요.** 그래서 "이제 과금을 붙여서 매출을 일으키면 원하는 성장을 만들어낼 수 있을 거라는" 믿음과 희망을 가졌죠.

실제로 뚜껑을 까 보니까 **월 매출액이 수천만 원 수준**인 거예요. 큰 사이즈로 성장할 수 있는 기미는 전혀 보이지 않았어요.

"모두닥이 정말로 풀고자 하는 문제는 뭐야? 모두닥이 필요로 하는 고객은 구체적으로 어떤 페르소나를 갖고 있어?" 했을 때, "대한민국 국민 전부요"라고 이야기할 수밖에 없는 거예요. 그게 자연스럽게 매출로 이어지지 못하는 거고, **깊이가 없는 거죠.**

사실 확장은 쉽거든요. 근데 **밀도 있게 만드는 건 되게 어렵더라고요.** 거기서 되게 아차 싶었어요. 너무 넓은 범위가 아니라, 정말 하나를 제대로 뒤덮어서 **"와, 얘네 진짜 이렇게까지 판다고?"**라는 이야기를 들어야 되는 건가?

## 안과·시력교정 시장의 발견 [08:14]

저희가 광고를 붙이면서 특가로 상담을 신청하거나 예약할 수 있는 기능을 도입했어요. 여러 진료 과목을 다 뜯어보고 예약이나 신청이 늘어나는 추이를 봤더니, 어느 한 진료 과목이 유독 빠르게 성장하고 있더라고요. 저희도 모르는 사이에 — 거기가 바로 **안과**였고, **시력교정술**이었던 거죠.

**우연이었어요.** 대학생들이 시력교정술을 많이 알아보다 보니까 유독 대형 안과들의 리뷰가 정말 많이 쌓였던 거예요. 그 리뷰를 보러 오는 대학생·직장인들이 많아졌고, 자연스럽게 모두닥에서 예약하는 수도 늘었죠.

그러면서 안과들 사이에서도 "모두닥을 통해서 시력교정을 알아보는 분들이 많으니 여기 한번 광고해 보면 좋겠네" 하는 입소문이 나게 됐고, **매년 두 배 이상씩 늘었어요.**

---

## 서울대 축제에서의 미친 듯한 유저 확보 [08:46]

초기 유저를 어떻게 모을까 고민하던 차에 서울대학교에서 메일이 왔어요. "축제하는데 부스 들어올 기업 모집한다." 그래서 "여기 해보자" 해서 갔죠.

데이터를 보니까 서비스를 많이 사용은 하는데 **정보만 보고 예약을 안 하네.** 이 문제를 어떻게 풀 수 있을까 고민하던 시기였어요.

목표는 서울대 재학생 3~4만 명을 거의 다 가입시키면 원했던 10~20% 시장은 먹을 수 있지 않을까 하는 것이었어요. **일단 가입자 수를 미친 듯이 모아보자.** 첫째 날은 정말 미친 듯이 넣었고, 둘째 날은 비가 미친 듯이 왔어요. 어떻게든 가입시켜야 하니까 그냥 앞뒤로 판넬 붙인 다음에 전단지 나눠주면서 "원플러스원, 가입하면 메가커피 준다. 제발 가입해 달라" 하면서 옆에서 지켜보고 "진짜 감사해요, 감사해요" 하면서 가입시켰어요.

공대에 찾아갔는데 **진짜 아무도 말을 안 받아주는 무서운 곳**이었거든요. 너무 자존심이 상하는 거예요. 그래서 **가위바위보를 문 앞에서 시작했어요.** 지면 가입 안 하시고, 제가 이기면 가입해 주시고 커피 쿠폰 얻어 가시고. 저는 거기서 호객꾼 1인이었어요.

## PMF를 느꼈던 순간 [09:49]

처음 모두닥에 합류했을 때 "억업 동아리인가?"라는 걱정이 많이 됐어요. 아직 돈도 못 벌고 있는데, 안절부절해 보이는 대표가 진짜 공부만 소주하면서(홀로 몰두하면서) 한 명이라도 더 데려오려고 뛰어다니는 모습을 보면서, "아 우리 잘 되겠다, 성장하겠다" 하는 벅찬 감정이 있었어요.

예상했던 3,000명 가입 후에 단기적으로 **신청이 일어나는 거예요.** 신청한 사람들 인터뷰를 했을 때 "주변 사람들한테 이 제품 얼마나 추천해 주고 싶어?" 하고 5점 만점으로 물어봤는데, **대부분 4점·5점을 이야기하는 거예요.** 이전까지 만들었던 제품은 같은 질문에 대해 3점 정도의 보통 수준 답변이었거든요. 근데 이 제품은 "추천할 것 같다"라고 강력하게 말하는 거예요.

그래서 **"아, 이거는 PMF(Product-Market Fit, 제품-시장 적합성)가 맞는 것 같다"**라는 감이 왔어요.

## 조직 문화의 전환: 더 빡세게, 더 집착하는 팀으로 [10:52]

그 이후에 모두닥 팀이 정말 더 허슬링하고 더 빡세게 일하는 문화로 바뀌어야 된다는 생각이 시작됐어요. 제가 정말 빡세게 일하는 건 쉽다고 생각했는데, 같이 하는 팀원들에게 **"이 정도의 완성도로 더 집착해서 더 만들어야 된다"고 말하는 건** 저도 처음 해본 일이었어요.

저 스스로도 매너리즘에 있었던 것 같아요. 매너리즘을 깨고 **"진짜 이 순간 내가 죽는다면 후회하지 않으려면 어떤 태도를 가져야 할까"** 고민했어요. 아무리 최악이라 해도 죽기보다 더하겠어? 이런 말을 하잖아요. 모두닥에서 정말 최악은 뭘까? **저 혼자 남는 상황**일 것 같고, 그럼 내가 혼자 남아도 이걸 계속 이어갈 수 있을까? 답은 **예스**였어요.

내가 그 상황을 두려워하지 않고 나아갈 수 있다면, 이 변화를 적극적으로 가져갈 수 있겠네, 라는 생각을 하는 데까지 시간이 걸렸어요.

## 리프레시 휴가 후 돌아와 보니 분위기가 바뀌어 있었다 [11:53]

리프레시 휴가가 3년 차에 2주가 나와서 갔다 왔는데, **분위기가 완전히 뒤바뀌어 있는 거예요.** 단지 2주 휴가를 갔다 온 것뿐인데 왜 이렇게 분위기가 달라졌지? 당황스러웠어요.

같은 팀원분이 있었고, 가기 직전에 "다음에 어떻게 잘해보자"라고 도모하고 갔었거든요. 근데 갔다 온 직후 그 당일 첫날에 그 팀원분이 오셔서 **"그만두게 됐다"**고 하시는 거예요. 이게 무슨 일이지?

## 이터레이션 속도를 두 배에서 다섯 배로 높이다 [12:25]

제품 팀은 일단 두세 명 단위로 잘게 나눴어요. **2주에 하나의 기능을 배포**했던 수준의 이터레이션(반복 개선) 속도였다면, **일주일, 3일에 한 팀이 그 분량을 다 하도록** 듀티를 설정하고 "빠르게 실험해서 가설을 검증하자"고 했어요. 속도를 거의 **두 배에서 다섯 배 이상 높였죠.**

사실 집에 가서 어떻게 잠들었는지 기억 안 날 정도로 하루가 굉장히 빡빡했어요.

## 동료들의 줄퇴사, 그리고 버텨낸 과정 [12:57]

저의 동료들이 **줄퇴사를 하기 시작했어요.** 한 분은 제가 진짜 구질구질하게 붙잡았어요. "매일매일 커피 사 줄 테니까 내일도 다니는 거 어때? 맛있는 거 사 줄 테니까 다음 달에도 다니는 건 어때?"

조직이 급변하고 CEO 의지가 강력할 때 HR 담당자는 선택 옵션이 없다고 생각해요. 가장 큰 문제는 **남아 있는 구성원들에게 끼치는 영향**이잖아요. 전체적으로 업무 몰입도가 깨질 수밖에 없고요. 그래서 **최대한 솔직하게 커뮤니케이션**하려고 노력했어요. "이런 이유로 인해서 이렇게 하게 됐다"고요.

---

## 매출 기준으로 의사결정을 단순화하다 [13:27]

입찰 방식이 아예 바뀌었어요. 병원 수를 늘리는 것보다 **유저 수를 늘리는 게 훨씬 더 중요한 상황**이었고요.

**의사결정의 기준이 엄청 단순해졌어요.** "이거 매출을 낼 수 있냐, 없냐"로요. 임팩트를 종합적으로 고려하다 보면 가설도 뾰족하지 못하고 임팩트도 애매한 실험들이 많았는데, 매출을 낼 수 있냐 없냐만 따지다 보니까 자연스럽게 집중해야 할 **고객이 재정의**됐어요.

고객이 진짜 서비스를 이용한다는 건 결국 돈을 내는 거더라고요. 사람들은 편하게 "이 서비스 좋아요"라고 말은 하지만, **진짜 좋으면 사거든요.** 그걸 여실히 깨달았어요.

저희 고객, 돈을 내는 분은 광고비를 내는 **병원**이잖아요. 그럼 병원들에게 정말 돈을 내고 싶은 서비스가 무엇인지를 재정의할 수 있게 되더라고요.

내가 얼만큼 내는 게 합리적인지를 결국 맞춰 가는 과정을 더 집요하게 파고들었어요. **왜 이 사람은 돈을 낼까? 왜 만족할까? 만족하는 포인트는 뭔지를 캐치하고, 그걸 되게 강화시켜요.**

그게 팬시(멋져)하게 보이지 않을 수 있어요. 근데 저는 사업이라는 건 결국 **사람들이 정말 필요로 하고 정말 가치를 주는 게 더 중요하다**고 생각해요. 그래서 팬시함보다도 "사람들이 정말 기꺼이 돈을 쓸 정도로 정말 필요한 걸까?"에 더 집중하게 된 것 같아요.

---

## 세일즈 현장: 병원 광고주 응대의 일상 [14:59]

저는 무조건 8시 이전에 출근하는 편이에요. 일이 많으면 7시요. 하루의 절반 이상이 **병원 응대**예요. 9시간 근무한다고 쳤을 때 네다섯 시간은 문의 처리하는 데 시간이 많이 들어요.

문의 내용이 "저희 성과를 더 내고 싶은데 어떻게 해야 될까요? 저희가 지금 뭔가 잘 안 되고 있는 것 같은데 뭐가 문제일까요?" 이런 거거든요. 가볍게 1~2분 만에 처리할 수 있는 문의가 아니어서 굉장히 많은 시간을 쓰고, 이 응대가 **세일즈로 직결**되거든요.

---

## 초기 광고주 확보의 어려움: 쓰레기통에 버려진 자료 [16:03]

처음에 광고주 수를 늘리자고 했을 때 **강남에 있는 모든 안과한테 전화**를 돌렸어요. 근데 일단 아무도 안 받으시고, "모두닥인데요"라고 하면 바로 끊으시거나. 이렇게 되면 광고주 수를 늘리지 못하겠다 싶어서 자료를 뽑아서 병원에 직접 갔어요.

**환자인 척 앉아 있다가** 원장님 뵈러 왔다고 했더니 간호사분들이 당황하시죠. 약속하고 오신 줄 알고. 원장님을 마주쳤는데, 원장님이 "아 그래요, 읽어볼게요" 하고 자료 받으시더니 **바로 쓰레기통에 넣으시는 거예요.**

근데 읽어보지도 않는 이유가 너무 궁금해서 자주 연락을 계속 드렸어요. "읽어보셨어요?" 그러다가 **한 1년 뒤에** 다시 연락 오셔서 "광고 한번 해보겠다"라고 하셨죠.

---

## 세일즈를 즐기는 사람의 마인드 [17:06]

저는 항상 대표님한테도 같은 말씀을 드려요. **"재미없으면 당장 내일도 나갈 거예요."** 기획하는 것도 재밌고, 제 설득으로 광고주가 사용해서 효과를 많이 보는 것도 재밌어요. 만들어진 상품을 회원들이 더 많이 이용하는 것도 재밌어요. 이 과정을 통해서 동료들이 힘들게 만든 제품이 인정받는 것, 저는 최고의 환경이라 생각해요.

**조금만 더 하면 더 잘 될 수 있고, 더 많은 사람들이 이 서비스를 이용할 수 있는데 왜 더 안 해야 되지?**

---

## 적은 인원, 더 많은 사업부서: 역설의 조직 운영 [17:37]

한 번 나올 때 병원 다섯~여섯 개를 싹 방문하고 돌아가는 편이에요. 매일 서너 시간씩 쓰는 것보다 하루 통으로 9시간 정도 쓰고 진행하는 게 나을 것 같아서요.

되게 역설적으로 들릴 수 있지만, **오히려 팀원은 거의 반 수준으로 줄어들었는데, 하는 사업부서는 거의 세 배로 늘었어요.** 말이 되냐고 하실 수 있는데, 예를 들어 제품 개발팀도 보통 다섯~여섯 명으로 구성되잖아요. 그렇게 많이 구성될 필요 없이 **두 명이면 충분히 더 빠르게 검증하고 매출도 일으킬 수 있고**, 사업을 빠르게 검증해 나갈 수 있더라고요.

만약 이 사업이 정말 충분히 수익성이 있고 스케일러빌리티(확장 가능성)가 있다고 판단되면 그때 사람을 채용해서 나가면 되는 거예요.

**팀의 인원이 많은 게 중요한 게 아니라, 얼마나 오너십을 가지고 "어떻게든 되게 만들고 싶다"는 열망을 가진 팀원 한 명이 중요한 거지**, 팀원이 빵빵하냐가 핵심은 아닌 것 같아요.

중요한 건 **그 기준을 타협하지 않고 낮추지 않는 것**이에요. 같이 일할 때 "와, 이 사람은 어떻게 이렇게까지 생각할 수 있지? 이렇게까지 행동할 수 있지?" 하는 생각이 드는 사람이면 하루만 같이 일해도 알거든요.

## 고객 만족도 조사와 시니어 팀 이야기 [19:12]

(전화 만족도 조사 장면)

한 50분 정도 전화를 해야 해요.

저는 제품 팀 중에서도 시니어 팀 PO(Product Owner)로 일하고 있어요. **50·60·70대 분들께서 의료 서비스를 잘 받으실 수 있도록** 서비스를 런칭하고, 개선하고, 어르신 분들 만나고, 이런 전반적인 작업을 하고 있어요.

---

## 시니어 팀 PO의 합류 과정 [19:43]

저는 간호학을 전공했고, 국제 보건 사업에 관심이 있었어요. 특정 국가의 문화에 맞는 보건 사업을 진행하는 게 재밌을 것 같아서 글로벌 의학 센터에서 보조 연구원으로 일했어요.

해외 사업을 본격적으로 해보려는 시점에 **갑자기 코로나가 터졌고**, 그러면 이 타이밍에 차라리 병원 임상 경험이 있으면 좋지 않을까 싶어 서울 삼성병원에 취업했어요. 그런데 코로나 시기가 길어지면서 바로 발령을 받을 수 있는 상황이 아니었어요.

그러면 평소 관심 있었던 스타트업 씬에서 일해볼 수 없을까? 그 당시 모두닥에서 인턴으로 일했던 친구가 "모두닥에서 인턴을 구하고 있는 것 같은데 관심 있어? 대표님 한번 만나볼래?"라고 해서, 인턴 자리를 제안받으면서 합류하게 됐어요.

---

## 시력교정 유입 늘리기에서 시니어 백내장 시장으로 [20:45]

맨 처음에 시니어 팀을 맡았던 건 아니었어요. 시력교정술 유입을 더 늘리고 싶은데, 자체 콘텐츠 제작을 통해 유입시킬 수 없을까 해서 **유튜브 콘텐츠를 만들면서 실험**을 해보기로 했어요.

시니어분들이 정보를 유튜브에서 탐색하는 풀이 훨씬 더 많을 것 같다는 게 제 생각이었어요. 이미 잘되고 있는 라식·라섹 시장이 아니라, **구매가 이루어지지 않는 시니어분들을 타겟으로 해봤을 때 얼마나 매출이 일어나는지 보는 게 더 유의미하지 않을까?** 시니어분들의 **백내장** 쪽을 타겟으로 정보를 제공해 보자.

본격적으로 백내장 수술을 공부하다 보니까, **백내장 시장이 시력교정술보다 네 배, 다섯 배나 큰 시장**이거든요. 가격 레인지가 급여성은 80만 원인데, 비급여는 800만 원, 1천만 원까지 하는 수술이에요.

어르신분들이 이 가격을 잘 알 수 있을까? 가격 차이가 결국 안에 넣는 렌즈 차이인데, 렌즈 이름이 '클라레온', '팬옵틱스' 같은 영어 이름이에요. **우리 제품에서 잘 비교하고 선택할 수 있게끔 도와준다면 유의미하게 매출을 일으켜 볼 수 있지 않을까?**

---

## 시니어 고객 리서치의 어려움과 돌파구 [21:46]

지금 인플루언서 마케팅을 진행하고 있어요. 어르신분들이 좋아하는 큼직큼직한 썸네일 컨셉을 보내주시면 저희가 확인하고, 괜찮다면 1차 편집본 전달하는 식으로요.

진짜 어려운 부분이 많았어요. 설능력(전시장·노인 복지관 등)에 나가서 **어르신들 붙잡고 여쭤봤어요.** "병원 어떻게 방문하세요?" 하면 "뭐 때문에 그러냐"고 하시고, "백내장 관심 있으세요? 병원 방문 도와드리려고 하는데요" 하면 **"온라인으로 누가 가냐"**면서 지인 이야기만 듣고 간다는 답변이 진짜 많았어요.

"절대 안 쓰신다고 하는데, 이걸 만들어봤자 아무도 안 쓰시는 거 아니야?"라는 생각이 들었죠. 사실 제가 너무 막연하게 생각했던 거예요. 2~30대도 시력교정을 찾는 사람마다 특성이 다 다른데, **저는 시니어를 하나의 그룹으로만 크게 생각했던 거예요.**

50대에서 70대의 **액티브 시니어**도 있을 거고, 70대 이상의 **케어 시니어**도 있을 거고. **더 타겟을 좁혀서** 이분들한테 어필해야겠구나라고 생각했어요.

그런 분들을 한 분씩 모두닥을 이용하셨던 분 중에 만나면서 프로토타입 같은 걸 보여드리고 "이거 어떠세요?"라고 많이 여쭤봤어요. 그때 "추천할 것 같다", "너무 좋다"라는 반응을 들으면서, **"이거 그때 서울대 축제에서 받았던 느낌이랑 비슷한데, 해볼 만할 것 같은데"**라고 하면서 서비스를 런칭했어요.

---

## 시니어 팀의 빠른 성과: 두 명이 만든 월 5천만 원 [23:18]

다행히 **워킹이 되더라고요.** 시니어 팀 같은 경우는 **오픈한 지 4개월도 안 돼서 월 5천만 원 매출을 달성**할 수 있을 것 같고, 올해 안에 아마 억 단위 매출이 될 것 같아요. 진짜 빠르게 성장하고 있는데, **이 팀이 두 명밖에 없어요.**

그런 부분을 보면서 "진짜 사람이 꼭 많이 필요하진 않네. **정말 집요하게 뭔가를 풀어나가고 제품을 개선하는 게 되게 중요하네**"를 느꼈어요.

---

## 새로운 사업: 외국인 의료 관광 (대만 시장) [23:49]

최근 들어서 한국 의료를 이용하는 외국인 수들이 급증하고 있어요. K팝·K컬처로 인한 것이라 생각되는데, 60만 명 정도가 외국인들이 한국 병원을 이용했는데, 1년 만에 작년에 거의 **119만 명** — 거의 두 배 정도 성장했어요.

외국인들이 한국 병원을 이용하는 과정에서 애로사항이 많더라고요. 제가 직접 인터뷰를 하다가 **국가를 하나 지정했는데, 대만으로 지정했어요.** 대만 시민들이 한국에서 병원을 어떻게 더 잘 이용할 수 있을지를 고민하는 팀이고, 이렇게 새 팀으로 사업을 운영하고 있죠.

---

## 번아웃을 이기는 법: 미션에서 힘을 찾다 [24:20]

제가 되고 싶은 사람은 **"어떻게든 문제를 해결하는 사람"**이에요. 그런 사람이 되기 위해서 제일 문제가 되는 건 뭘까라고 생각해 보면, **번아웃이 오거나 중간에 포기해 버리는 것**이 제일 큰 허들이라고 생각했어요.

그때 해결책을 **미션에서** 찾으려고 했던 것 같아요. 내가 하는 일이 그냥 문제를 해결하는 게 아니라 **이 사회에 도움이 되는 일을 해결한다, 실체가 있는 문제를 해결하는 일을 한다**고 하면, 포기하거나 좌절하는 순간에도 조금 더 힘을 내서 다시 일할 수 있겠다고요.

---

## 팀원들이 말하는 모두닥 [24:52]

그냥 그 문제를 진짜 풀고 싶은 것 같아요. 지금 시니어 팀은 시니어 문제를 너무너무 해결하고 싶고, 그게 매출이 가속화되는 게 실제로 보이고, **단 이틀 만에 끝내면 이 기능만으로도 매출이 일주일에 몇백만 원씩 더 올라가는** 게 보이니까 재밌잖아요.

대표님이 원하는 방향이 너무 맞다고 생각해요. 더 많은 사람이 이 서비스를 사용해야 된다고 생각하고, **아픈 사람이 점점 많아질 텐데 그 기둥에 저희가 있었으면 좋겠어요.** 이게 되게 당연하다고 생각했고, 이걸 한 번도 의심해 본 적이 없어요.

## 스페이스엑스 이야기와 경제적 자유 [25:23]

제가 아는 지인 중 한 분이 **스페이스엑스 초기 팀원**이었어요. 그 친구가 이야기하더라고요. 일론 머스크가 정말 치열하게 일했던, 정말 될지 안 될지도 반신반의하던 시절을 겪으면서 — 스페이스엑스가 세 번 실패하고 네 번째 발사를 성공했을 때 — 결국 퇴사했고, 그때 **스톡옵션을 행사했는데 그게 100억이 넘는 거예요.**

그런 조직이고 싶어요. 치열하게 일하면서도 동시에 받을 수 있는 **경제적 자유도 확실히** 얻고, 내가 진지하게 뭘 원하는지를 고민하면서 살 수 있는 삶을 누리게 하고 싶어요. 그렇기 때문에 **더 치열하게 일을 해야 된다**고 생각해요.

## 예비 창업자들에게 전하는 말 [25:54]

창업이란 길은 **최대한 안 하시는 게 좋을 것 같아요.** 솔직히 하신다면 정말 각오하고 해야 돼요. 창업이라는 게 워낙 쉽지 않은 길이고 80~90%가 망하는 게 스타트업이다 보니까, 웬만하면 안 하는 걸 추천드려요.

하신다면 **진짜 풀고 싶은 문제를 꼭 찾았으면 좋겠어요.** "이게 정말 잘될 것 같아서"라기보다는, 누군가가 이 문제로 고통받고 있어서 내가 꼭 해결하고 싶다는 문제를 잘 찾으면 **끈기도 따라오고, 존버(버티기)도 하게 되는 것 같아요.**

근데 **존버만 답이라고 생각하진 않아요.** 솔직히 존버만 하면 안 되는 게, 여러 다양한 각도로 실험을 해야 돼요. 그래서 되게 유연하게 모든 가능성을 열어두고, **내가 기존에 세웠던 가정이 완전히 무너질 수 있다 하더라도 그걸 무릅쓰고 새로운 시도를 하는 걸 두려워하지 않았으면 좋겠어요.**

저도 되게 무서운 순간들이 있었거든요. "이렇게 해도 정말 될까? 이러면 사람들 다 떠나지 않을까?" 그래도 최악이라 해봤자 죽기보다 더하겠어요. **과감한 게 필요할 때가 있어요.** 제가 과감하지 못했던 순간들이 되게 후회로 남거든요.

**현상 유지가 진짜 제일 해서는 안 되는 일**인 것 같고, 계속 새로운 시도를 하고, 풀고 싶은 문제가 정말 간절하다면 그 문제를 한증막 같이 붙잡아서 가신다면 **무조건 길이 있을 거라고** 이야기하고 싶어요.

## 🔗 첫 번째 이야기: 점 잇기 (Connecting the Dots) [00:41]

### 📌 입양 이야기와 대학 중퇴 [00:41]

- 잡스의 생모는 젊은 미혼 대학원생이었고, 아이가 **대졸 부모에게 입양**되길 강하게 원했어요.
- 원래 변호사 부부에게 입양될 예정이었지만, 그 부부가 **막판에 딸을 원해서** 대기자 명단에 있던 잡스의 양부모에게 전화가 갔어요.
  - 양어머니는 대학을 졸업하지 않았고, 양아버지는 고등학교도 마치지 못했어요.
  - 생모는 입양 서류에 서명을 거부했다가, 양부모가 **"반드시 대학에 보내겠다"** 약속한 뒤에야 동의했어요.
- 17년 뒤 실제로 대학(리드 칼리지)에 진학했지만, **스탠퍼드만큼 비싼 등록금**이 노동자 계층이던 양부모의 평생 저축을 갉아먹고 있었어요.
- 6개월 만에 "이 대학이 내 인생에 어떤 도움이 되는지 모르겠다"는 결론에 이르러 **자퇴를 결심**해요.

> "돌이켜 보면 그때 내린 최고의 결정 중 하나였습니다."

### ✨ 자퇴 후의 삶 — 캘리그래피 수업 [03:21]

- 자퇴 뒤에도 18개월쯤 학교에 남아 **관심 있는 수업만 청강**했어요.
- 기숙사가 없어서 친구 방 바닥에서 자고, **콜라병 보증금 5센트**로 끼니를 때우고, 매주 일요일 **11km를 걸어** 하레 크리슈나 사원에서 한 끼 식사를 얻었어요.
- 리드 칼리지는 당시 **미국 최고 수준의 캘리그래피(서예) 수업**을 제공하고 있었어요.
  - 세리프·산세리프 서체, 글자 간격, 아름다운 타이포그래피의 원리를 배웠어요.
  - *"과학이 포착할 수 없는 예술적 미묘함"*에 매료되었지만, **실용적 쓸모는 전혀 기대하지 않았어요.**

### 💡 10년 뒤 — 매킨토시와 타이포그래피 [03:53]

- 10년 뒤 **첫 번째 매킨토시**를 설계할 때, 캘리그래피 수업에서 배운 것이 전부 되살아났어요.
- 매킨토시는 **아름다운 타이포그래피를 탑재한 최초의 컴퓨터**가 되었어요.
- 그리고 **윈도우가 맥을 카피**했기 때문에, 결국 모든 PC가 다양한 서체와 비례 간격 폰트를 갖게 된 것이에요.

> "앞을 보며 점을 이을 수는 없습니다. 뒤돌아볼 때만 이을 수 있죠."

- **핵심 메시지**: 미래를 예측할 수 없으니, ==직감이든 운명이든 무언가를 믿고 따라가라.== 점들이 언젠가 연결될 거라는 확신이, 익숙한 길을 벗어날 용기를 준다는 이야기예요.

## ❤️ 두 번째 이야기: 사랑과 상실 (Love and Loss) [05:28]

### 📌 애플의 성장과 해고 [05:28]

- 20살 때 **워즈니악과 함께 부모님 차고에서 애플을 창업**했어요.
- 10년 만에 애플은 **직원 4,000명, 매출 20억 달러 규모의 회사**로 성장했어요.
- 최고의 작품 **매킨토시**를 출시한 직후, 잡스는 30살이 되었고… ==그리고 해고당했어요.==
- 회사를 함께 운영하기 위해 영입한 경영자와 비전이 갈렸고, **이사회는 그 사람 편을 들었어요.**

### 💔 상실의 시간 [06:32]

- 성인 인생 전부를 바친 것을 잃었고, **완전히 무너졌어요.**
- *"이전 세대 기업가들에게 바톤을 떨어뜨린 것 같은 죄책감"*을 느꼈어요.
- 데이비드 패커드(HP 창업자), 밥 노이스(인텔 공동 창업자)를 만나 사과까지 했어요.
- 실리콘밸리를 떠나는 것까지 고민했지만, **한 가지를 깨달았어요.**

> "나는 여전히 내가 하는 일을 사랑하고 있었습니다."

### 🔄 새로운 시작 — NeXT, Pixar, 그리고 복귀 [07:03]

- **성공의 무거움**이 걷히고 **초심자의 가벼움**이 찾아왔어요. 인생에서 가장 창의적인 시기가 시작되었어요.
- 이후 5년간 세 가지 일이 일어났어요:
  1. **NeXT** 설립
  2. **Pixar** 설립 → 세계 최초 장편 컴퓨터 애니메이션 *《토이 스토리》* 제작
  3. 인생의 반려자 **로렌 파월**을 만나 결혼
- 놀라운 반전으로 **애플이 NeXT를 인수** → 잡스는 애플에 복귀했고, NeXT의 기술이 **애플 르네상스의 핵심**이 되었어요.

> "쓴 약이었지만, 환자에겐 필요한 약이었던 것 같습니다."

### ✅ 핵심 메시지 [08:05]

- ==**좋아하는 일을 찾으세요. 그리고 절대 타협하지 마세요.**==
- 인생의 큰 부분을 일이 차지하는데, **진정으로 만족하는 유일한 방법은 위대하다고 믿는 일을 하는 것**이에요.
- 아직 못 찾았다면 **계속 찾으세요. 안주하지 마세요(Don't settle).**

## 💀 세 번째 이야기: 죽음 (Death) [09:09]

### 🪞 매일 아침의 질문 [09:09]

- 17살 때 읽은 명언:

> "매일을 인생의 마지막 날처럼 살면, 언젠가 반드시 맞는 날이 온다."

- 이후 **33년간 매일 아침 거울 앞에서** 스스로에게 물었어요:

> "오늘이 내 인생 마지막 날이라면, 지금 하려는 일을 할 것인가?"

- "아니오"가 **며칠 연속** 이어지면, **뭔가를 바꿔야 한다**는 신호로 받아들였어요.

### ⚠️ 죽음이라는 도구 [09:40]

- 곧 죽는다는 사실을 기억하면, 외부의 기대·자존심·실패에 대한 두려움이 **모두 사라져요.**
- 오직 **정말 중요한 것만** 남아요.

> =="당신은 이미 벌거벗은 상태입니다. 마음을 따르지 않을 이유가 없습니다."==

### 🏥 췌장암 진단 [10:13]

- 약 1년 전(2004년), 아침 검사에서 **췌장에 종양**이 발견되었어요.
- 의사들은 **불치의 암**이며, 남은 수명이 **3~6개월**이라고 말했어요.
  - *"집에 가서 정리하라"* — 죽음을 준비하라는 의사의 완곡한 표현이에요.
  - 10년에 걸쳐 아이들에게 해줄 이야기를 **몇 달 안에 다 해야** 한다는 뜻이에요.
- 그날 저녁 **생검(조직 검사)**을 받았더니, ==매우 드문 형태의 **수술로 완치 가능한 췌장암**==이었어요.
  - 의사들이 현미경으로 세포를 보고 **울기 시작**했다고 아내가 전해줬어요.

- 수술을 받고 건강을 회복했어요.

### 🌱 죽음에 대한 통찰 [11:48]

- 아무도 죽고 싶어하지 않지만, **죽음은 우리 모두가 공유하는 종착지**예요.
- 죽음은 아마도 ==**생명 최고의 발명품**==이에요 — 낡은 것을 걷어내고 새것에 길을 내주는 **변화의 대리인(change agent)**.

> "여러분의 시간은 한정되어 있습니다. 남의 삶을 사느라 시간을 낭비하지 마세요."

- **교조(독단)에 갇히지 마세요** — 그건 다른 사람의 생각으로 사는 것이에요.
- 타인의 의견이 **자신의 내면의 목소리**를 잠식하게 두지 마세요.
- ==**가장 중요한 것: 마음과 직관을 따를 용기를 가지세요.**== 그것들은 이미 당신이 진정 무엇이 되고 싶은지 알고 있어요.

## 📖 마무리: Stay Hungry. Stay Foolish. [12:51]

- 잡스가 젊었을 때 사랑했던 잡지 **《Whole Earth Catalog》** 이야기예요.
  - **스튜어트 브랜드**가 멘로파크 근처에서 만든 간행물로, *"구글의 종이 버전"* 같은 존재였어요.
  - 1960년대 말, PC도 데스크톱 퍼블리싱도 없던 시절에 **타자기·가위·폴라로이드 카메라**로 제작했어요.
- 마지막 호(1970년대 중반) 뒷표지에는 이른 아침 시골길 사진과 함께 이 문구가 적혀 있었어요:

> ==**"Stay Hungry. Stay Foolish."**==

- 잡스는 항상 스스로에게 그렇게 되길 바랐고, 이제 졸업생들에게도 같은 것을 바란다며 연설을 마쳤어요.

> **"Stay Hungry. Stay Foolish."**

> 4. **실패는 약이 될 수 있다**: 해고·실패·상실이 오히려 인생에서 가장 창의적인 시기를 열어줄 수 있어요.
> 5. ==**Stay Hungry. Stay Foolish.**== — 항상 갈망하고, 우직하게 도전하세요.

# 🎬 Steve Jobs' 2005 Stanford Commencement Address
영상 보면서 같이 읽기 좋게 정리했어요 👇 (옵시디언에도 저장됨)

## 🎯 한눈에 요약
> - 스티브 잡스가 2005년 스탠퍼드 졸업식에서 **자신의 인생에서 뽑은 세 가지 이야기**를 들려줘요.
> - **첫 번째 — 점 잇기(Connecting the Dots)**: 대학 중퇴 후 우연히 들은 캘리그래피 수업이 훗날 매킨토시의 아름다운 서체로 이어졌어요. **앞을 보며 점을 이을 수는 없고, 뒤를 돌아봐야만 보인다**는 메시지예요.
> - **두 번째 — 사랑과 상실(Love and Loss)**: 자신이 세운 애플에서 해고당했지만, 그 덕분에 NeXT·픽사를 세우고 더 창의적인 시기를 보냈어요. **자기가 사랑하는 일을 찾고, 절대 타협하지 말라**고 해요.
> - **세 번째 — 죽음(Death)**: 매일 아침 거울 앞에서 "오늘이 마지막 날이라면?"이라고 물었고, 실제 췌장암 진단을 받은 경험을 공유하며 **시간은 한정되어 있으니 남의 인생을 살지 말라**고 말해요.
> - 마무리 메시지는 __**"Stay Hungry. Stay Foolish."**__ — 항상 갈망하고, 우직하게 도전하라는 뜻이에요.

## 🎤 인트로 — 세 가지 이야기를 시작하며 [00:07]

- 잡스는 "사실 저는 대학을 졸업한 적이 없다"며 운을 떼요.

> "This is the closest I've ever gotten to a college graduation."
> *(이 자리가 제가 대학 졸업식에 가장 가까이 와 본 순간입니다.)*

- 오늘 할 이야기는 딱 **세 가지**. 거창한 것 없이, 자기 인생에서 꺼낸 이야기라고 해요.

## 🔗 첫 번째 이야기: 점 잇기 (Connecting the Dots) [00:41]

### 📌 태어나기 전부터 시작된 이야기 [01:12]

- 잡스의 **생모**는 미혼 대학원생이었고, 아이를 입양 보내기로 결심해요.
- 생모의 강한 조건이 하나 있었어요 — **반드시 대졸 부모에게** 입양되어야 한다는 것.
- 처음에는 변호사 부부가 입양하기로 되어 있었는데, 막상 아이가 태어나자 **"딸을 원한다"**며 거절해요.
- 결국 대기자 명단에 있던 잡스의 양부모가 한밤중에 전화를 받아요.

> "We have an unexpected baby boy; do you want him?" — "Of course."

- 그런데 양어머니는 대학을 졸업하지 않았고, 양아버지는 고등학교도 마치지 못했어요.
- 생모는 입양 서류에 서명하길 거부했다가, **"이 아이를 반드시 대학에 보내겠다"**는 약속을 받고 나서야 동의해요.

### 🎓 대학 중퇴 — 그리고 더 값진 배움 [02:19]

- 17년 뒤, 약속대로 대학에 진학해요. 하지만 선택한 리드 칼리지(Reed College)는 **스탠퍼드만큼 비싼 학교**였어요.
- 노동자 계층이었던 부모님의 **평생 저축이 등록금으로** 나가고 있었어요.
- 6개월 뒤, 잡스는 대학의 가치를 느끼지 못했어요 — 인생에서 뭘 하고 싶은지도, 대학이 그걸 어떻게 도와줄 수 있는지도 몰랐거든요.
- 그래서 **자퇴**를 결심해요. 무섭긴 했지만, 돌이켜 보면 **인생 최고의 결정** 중 하나였다고 해요.

자퇴 후의 삶은 낭만적이지만은 않았어요:

- 🛏️ 기숙사가 없어서 **친구 방 바닥에서** 잠을 잤어요.
- 🥤 **콜라 빈 병을 반납해서** 5센트 보증금으로 끼니를 해결했어요.
- 🚶 매주 일요일 밤마다 **11km를 걸어서** 하레 크리슈나 사원에서 일주일에 한 끼 제대로 된 식사를 했어요.

### ✒️ 캘리그래피 수업 — 10년 뒤에 빛난 점 [03:21]

- 자퇴했기 때문에 필수 수업을 들을 필요가 없었고, **호기심이 가는 수업에 청강**할 수 있었어요.
- 리드 칼리지는 당시 미국 최고의 **캘리그래피(서예/타이포그래피) 교육**을 하고 있었어요.
- 캠퍼스의 모든 포스터, 서랍의 모든 라벨이 아름답게 손으로 쓰여져 있었어요.
- 잡스는 캘리그래피 수업을 듣고 **세리프·산세리프 서체, 글자 간격, 위대한 타이포그래피의 원리**를 배워요.

> "It was beautiful, historical, artistically subtle in a way that science can't capture."
> *(과학으로는 포착할 수 없는 방식으로 아름답고, 역사적이고, 예술적으로 섬세했어요.)*

- 당시에는 이 지식이 **실용적으로 쓰일 가능성이 전혀 없어** 보였어요.
- 그런데 **10년 뒤**, 최초의 매킨토시 컴퓨터를 설계할 때 이 모든 것이 떠올랐어요.
- 매킨토시는 __**아름다운 타이포그래피를 갖춘 최초의 컴퓨터**__가 되었어요.
- 그리고 윈도우는 매킨토시를 따라했기 때문에, **잡스가 그 수업을 듣지 않았다면 오늘날 개인용 컴퓨터에 다양한 서체가 없었을 수도** 있어요.

### 🔑 핵심 교훈 [04:57]

> "You can't connect the dots looking forward; you can only connect them looking backwards."
> *(앞을 보며 점을 이을 수는 없어요. 뒤를 돌아봐야만 이을 수 있어요.)*

- 그러니 **무언가를 믿어야** 해요 — 직감이든, 운명이든, 삶이든, 카르마든.
- 점들이 미래에 어떻게든 연결될 거라고 믿는 것, 그 믿음이 **자신의 마음을 따를 용기**를 줘요.
- 그것이 남들이 가는 길에서 벗어나게 하더라도, __결국 그것이 모든 차이를 만들어요.__

────────────────────────────

## ❤️ 두 번째 이야기: 사랑과 상실 (Love and Loss) [05:28]

### 🚀 애플의 탄생과 성장 [05:28]

- 잡스는 인생 초기에 **사랑하는 일을 찾은 행운아**였어요.
- 20살 때 **워즈(스티브 워즈니악)**와 함께 부모님 차고에서 애플을 시작해요.
- 10년 만에 애플은 **직원 4,000명 이상, 매출 20억 달러** 규모의 회사로 성장해요.
- 최고의 작품인 **매킨토시**를 출시한 직후, 잡스는 막 30세가 되었어요.

### 💔 해고 — 자기가 만든 회사에서 쫓겨나다 [05:59]

- 그리고… **해고당해요.**
- 애플이 커지면서 잡스는 회사를 함께 운영할 인재를 영입했는데, 처음 1년은 잘 됐지만 **비전이 엇갈리기 시작**했어요.
- 결국 갈등이 생겼고, 이사회는 **상대편의 손을 들어줬어요.**
- 30살에, 아주 공개적으로 쫓겨난 거예요.

> "What had been the focus of my entire adult life was gone, and it was devastating."
> *(성인이 된 이후 삶 전체의 중심이었던 것이 사라졌고, 그건 처참한 일이었어요.)*

- 잡스는 몇 달간 무엇을 해야 할지 몰랐어요.
- 선배 기업인(데이비드 패커드, 밥 노이스)을 찾아가 **"이렇게 망쳐서 죄송하다"**고 사과했어요.
- 실리콘밸리를 떠날까도 생각했어요.

### 🌅 다시 시작하다 — 해고가 가져다 준 것 [07:03]

- 하지만 천천히 깨달은 게 있었어요 — __**여전히 자기가 하던 일을 사랑한다**__는 것.
- 거절당했지만, 사랑은 변하지 않았어요. 그래서 **다시 시작하기로** 해요.

> "The heaviness of being successful was replaced by the lightness of being a beginner again."
> *(성공의 무거움이 다시 초보자가 된 가벼움으로 바뀌었어요.)*

5년간 일어난 일들:
- 🖥️ **NeXT** 설립
- 🎬 **Pixar** 설립 → 세계 최초 컴퓨터 애니메이션 장편 영화 __**토이 스토리**__ 제작 → 세계 최고의 애니메이션 스튜디오로 성장
- 💍 평생의 반려자 **로렌(Laurene)**을 만나 결혼

- 놀라운 전개로, **애플이 NeXT를 인수**하면서 잡스는 애플에 복귀해요.
- NeXT에서 개발한 기술이 **애플 르네상스의 핵심**이 돼요.

> "It was awful tasting medicine, but I guess the patient needed it."
> *(끔찍한 맛의 약이었지만, 환자에게 필요했던 거죠.)*

### 🔑 핵심 교훈 [08:05]

- 인생이 벽돌로 머리를 때릴 때가 있어요. **믿음을 잃지 마세요.**
- 잡스를 계속 나아가게 한 유일한 힘은 **자기가 하는 일을 사랑했다**는 것이에요.

> __**"You've got to find what you love."**__
> *(사랑하는 것을 찾아야 해요.)*

- 이건 일에도, 사랑에도 똑같이 적용돼요.
- 일은 인생의 큰 부분을 차지하고, 진정으로 만족하는 유일한 방법은 **위대한 일을 하는 것**.
- 위대한 일을 하는 유일한 방법은 **자기가 하는 일을 사랑하는 것**.

> __**"Keep looking. Don't settle."**__
> *(계속 찾으세요. 타협하지 마세요.)*

────────────────────────────

## 💀 세 번째 이야기: 죽음 (Death) [09:09]

### 🪞 매일 아침 거울 앞에서 [09:09]

- 17살 때 읽은 문구:

> "If you live each day as if it was your last, someday you'll most certainly be right."
> *(매일을 마지막 날처럼 살면, 언젠가 반드시 맞는 날이 올 거예요.)*

- 이후 **33년간** 매일 아침 거울을 보며 자신에게 물었어요:

> **"오늘이 내 인생 마지막 날이라면, 지금 하려는 일을 하고 싶은가?"**

- "아니오"라는 답이 **며칠 연속** 나오면, 뭔가를 바꿔야 한다는 신호로 받아들였어요.

### ⚠️ 죽음을 의식하는 것의 힘 [09:40]

- 곧 죽는다는 사실을 기억하는 것은 **인생의 큰 선택을 돕는 최고의 도구**예요.
- 죽음 앞에서는 외부의 기대, 자존심, 실패의 두려움 — 이런 것들이 전부 무너져요.
- __**진짜 중요한 것만 남아요.**__

> "You are already naked. There is no reason not to follow your heart."
> *(여러분은 이미 벌거벗은 거예요. 마음을 따르지 않을 이유가 없어요.)*

### 🏥 암 진단 — 죽음과 마주하다 [10:13]

- 약 1년 전(2004년), 잡스는 **암 진단**을 받아요.
- 아침 7시 반 스캔에서 **췌장에 종양**이 발견돼요.
- 의사들은 **거의 확실히 불치의 암**이라며, **3~6개월**밖에 살지 못할 거라고 말했어요.
- 의사의 조언은 "집에 가서 정리를 하세요" — 이건 사실상 __**"죽을 준비를 하세요"**__라는 뜻이에요.
  - 10년에 걸쳐 아이들에게 해주려던 말을 몇 달 안에 하라는 것
  - 가족이 편하도록 모든 걸 마무리하라는 것
  - 작별 인사를 하라는 것

- 그날 저녁, **조직검사(생검)**를 받았어요 — 내시경을 목구멍으로 넣어 췌장의 종양 세포를 채취했어요.
- 잡스는 진정제를 맞고 있었지만, 옆에 있던 아내 로렌이 전해준 이야기:

> 현미경으로 세포를 본 의사들이 **울기 시작했어요** — 수술로 완치 가능한 __**매우 희귀한 형태의 췌장암**__이었기 때문이에요.

- 수술을 받고 당시에는 건강을 회복했어요.

### 🔑 핵심 교훈 [11:48]

- 아무도 죽고 싶어 하지 않아요. 천국에 가고 싶은 사람조차 죽어서 가고 싶지는 않아요.
- 하지만 __**죽음은 우리 모두가 공유하는 목적지**__예요. 그 누구도 피한 적이 없어요.
- 잡스는 죽음을 **"삶이 만든 최고의 발명품"**이라고 표현해요 — 낡은 것을 걷어내고 새것을 위한 자리를 만드는 **변화의 도구**라고.

> __**"Your time is limited, so don't waste it living someone else's life."**__
> *(시간은 한정되어 있으니, 남의 인생을 사느라 낭비하지 마세요.)*

- **독단(dogma)에 갇히지 마세요** — 그건 남의 생각의 결과물 속에서 사는 거예요.
- 남의 의견이라는 소음이 **자기 내면의 목소리**를 삼키게 두지 마세요.
- 그리고 가장 중요한 것:

> __**"Have the courage to follow your heart and intuition. They somehow already know what you truly want to become."**__
> *(마음과 직관을 따를 용기를 가지세요. 그것들은 이미 여러분이 진정 무엇이 되고 싶은지 알고 있어요.)*

────────────────────────────

## 🌟 마무리 — Stay Hungry. Stay Foolish. [12:51]

- 잡스가 젊을 때, **『The Whole Earth Catalog(지구 백과)』**라는 전설적인 출판물이 있었어요.
- **스튜어트 브랜드(Stewart Brand)**가 만들었고, 개인용 컴퓨터나 데스크톱 출판이 등장하기 전인 **1960년대 후반**, 타자기·가위·폴라로이드 카메라로 제작했어요.
- 잡스는 이 책을 *"구글이 나오기 35년 전의 종이 구글"*이라고 표현해요 — 이상주의적이고, 멋진 도구와 훌륭한 아이디어로 가득 찬 책이었어요.

- 이 책의 **최종호 뒷표지**에는 이른 아침 시골길 사진이 있었고, 그 아래에 이런 글이 적혀 있었어요:

> ## __**"Stay Hungry. Stay Foolish."**__
> *(항상 갈망하라. 우직하게 도전하라.)*

- 잡스는 항상 **자기 자신에게** 이 말을 바랐다고 해요.
- 그리고 이제 졸업하는 학생들에게도 **같은 말을 전해요.**

> **"Stay Hungry. Stay Foolish."**

────────────────────────────

## 💡 핵심 정리
> 1. **점은 뒤돌아봐야 이어진다** — 지금 하는 경험이 미래에 어떻게 연결될지 알 수 없어요. 직감을 믿고 호기심을 따르세요.

> 5. __**"Stay Hungry. Stay Foolish."**__ — 항상 갈망하고, 우직하게 도전하세요.
