# 🎬 Steve Jobs' 2005 Stanford Commencement Address
영상 보면서 같이 읽기 좋게 정리했어요 👇 (옵시디언에도 저장됨)

## 🎯 한눈에 요약
> - 스티브 잡스가 스탠퍼드 졸업식(2005)에서 자기 인생의 **세 가지 이야기**로 삶의 철학을 전달
> - **점 잇기**: 대학 중퇴 후 청강한 캘리그래피 수업 → 10년 뒤 Mac의 아름다운 타이포그래피로. 미래를 보며 점을 연결할 순 없지만, 과거를 보면 반드시 이어져 있음
> - **사랑과 상실**: 애플에서 해고당한 것이 인생 최고의 사건 — NeXT·픽사·아내를 얻고 결국 애플에 복귀. 사랑하는 일을 찾을 것, 절대 타협하지 말 것
> - **죽음**: 매일 아침 거울 앞에서 "오늘이 마지막 날이라면?"을 물음. 암 진단을 받은 실제 경험에서 나온 말 — 죽음을 기억하는 것이 가장 중요한 선택 도구
> - 결론: **"Stay Hungry. Stay Foolish."** — 배고프게, 어리석게 살아라

────────────────────────────

## 📑 목차

1. 오프닝 — [00:07]
2. 첫 번째 이야기: 점 잇기 — [00:41]
3. 두 번째 이야기: 사랑과 상실 — [05:28]
4. 세 번째 이야기: 죽음 — [09:09]
5. 마무리: Stay Hungry. Stay Foolish. — [13:53]

────────────────────────────

## 🎓 오프닝 [00:07]

> "나는 사실 대학을 졸업한 적이 없어요. 이 자리가 내가 가장 가까이 가본 졸업식입니다."

- 잡스는 대학 중퇴자. 스탠퍼드 졸업식 연사라는 아이러니를 유머로 시작
- "세 가지 이야기를 할 거예요. 별거 없어요. 그냥 세 이야기."

────────────────────────────

## 🔵 첫 번째 이야기: 점 잇기 [00:41]

### 출생과 입양 배경 [01:12]

- 생모는 미혼 대학원생 → 대학 졸업자에게 입양시키려 했음
- 직전에 예정 양부모가 남자아이를 거부 → 대기 명단에 있던 **노동자 계층 부부**(아버지: 고졸 미만, 어머니: 대학 미졸업)에게 연락
- 생모는 서류 서명 거부 → 수개월 뒤, **양부모가 "대학에 보내겠다"는 약속**을 받고서야 서명

### 리드 칼리지 중퇴 [01:44]

- 17년 뒤, 약속대로 대학 진학 — 그런데 선택한 학교가 __스탠퍼드만큼 비싼 리드 칼리지__
- 6개월 만에 "이게 무슨 의미가 있나" 깨달음: 뭘 하고 싶은지도 모르면서, 부모가 평생 모은 돈을 쓰고 있었음
- **결단**: 중퇴. 당시엔 무서웠지만 돌이켜 보면 최선의 선택

### 중퇴 후의 삶 [02:49]

- 기숙사 방 없음 → 친구 방 바닥에서 잠
- 콜라 병 보증금(5센트)을 모아 밥을 사먹음
- 매주 일요일 7마일(약 11km)을 걸어 하레 크리슈나 사원에서 한 끼를 해결
- *"힘들었지만 나는 그 생활을 사랑했어요."*

### 캘리그래피 수업 → Mac 타이포그래피 [03:21]

- 필수 수업 없이 **흥미 가는 수업을 골라 청강** 가능해짐
- 리드 칼리지의 명물: __미국 최고 수준의 캘리그래피 수업__
  - 세리프·산세리프(serif/sans-serif) 서체
  - 자간(letter spacing) 조정법
  - 훌륭한 타이포그래피의 본질
- 당시엔 실용적 가치 0 → **10년 후 Mac을 설계할 때 전부 되살아남**
- Mac = 최초로 아름다운 타이포그래피를 갖춘 컴퓨터
- Windows가 Mac을 복사했으므로 → __모든 PC의 현대적 서체가 여기서 출발__

### 핵심 메시지 [04:57]

> "앞을 보며 점을 연결할 수는 없어요. 뒤를 돌아봐야만 연결할 수 있죠."

- 미래에 점들이 이어질 것이라는 **믿음**이 필요
- 직감·운명·삶·카르마 — 무엇이든, 그 믿음이 있어야 잘 닦인 길을 벗어날 용기가 생김

────────────────────────────

## ❤️ 두 번째 이야기: 사랑과 상실 [05:28]

### 애플의 성장과 해고 [05:59]

- 20세에 부모 차고에서 워즈니악(Woz)과 애플 창업
- 10년 만에 **직원 4,000명, 기업 가치 20억 달러** 회사로 성장
- Mac을 막 출시한 직후, 30세에 __애플에서 해고__

> "자기가 세운 회사에서 어떻게 해고될 수 있냐고요?"

- 함께 회사를 이끌 인재를 영입했는데 비전이 갈렸고, 이사회가 그 편을 들었음
- *"내 어른 인생 전체의 초점이 사라졌어요. 정말 무너졌습니다."*

### 상실 속에서 발견한 것 [06:32]

- 데이비드 패커드, 밥 노이스에게 찾아가 사과
- 실리콘밸리를 떠나고 싶다는 생각까지 함
- 그러다 천천히 깨달음: **"나는 여전히 내가 하는 일을 사랑한다"**
- 해고로 그 감정은 변하지 않았음 → __다시 시작__

### 해고 후의 창조적 시기 [07:03]

해고 이후 5년간 일어난 일:

| 사건 | 의미 |
|---|---|
| **NeXT** 창업 | 훗날 Apple에 인수, 현재 Apple의 핵심 기술이 됨 |
| **Pixar** 창업 | 세계 최초 컴퓨터 애니메이션 장편 〈토이 스토리〉 제작 → 세계 최고 애니메이션 스튜디오 |
| **아내 로린** 만남 | 함께 멋진 가정을 꾸림 |

> "애플에서 해고당한 게 내게 일어난 최고의 일이었어요."

- **성공의 무거움 → 초보자의 가벼움**으로 교체됨
- 쓴 약이었지만, 환자에게 필요했던 약

### 핵심 메시지 [08:05]

- __사랑하는 일을 찾아라. 절대 타협하지 마라.__
- 일이 삶의 많은 부분을 채울 것 — 진정한 만족은 **위대한 일**을 해야 오고, 위대한 일은 **사랑하는 일**에서만 나옴
- 아직 못 찾았다면: *"계속 찾아요. 타협하지 마세요."*

────────────────────────────

## 💀 세 번째 이야기: 죽음 [09:09]

### 매일 아침의 질문 [09:09]

- 17세에 읽은 문구: *"매일을 마지막 날처럼 산다면, 언젠가 반드시 맞는 날이 온다."*
- 이후 33년간 매일 아침 거울 앞에서 자문:

> __**"오늘이 내 마지막 날이라면, 지금 하려는 일을 할 것인가?"**__

- "아니오"가 며칠째 연속되면 → 무언가를 바꿔야 한다는 신호

### 죽음이 최고의 도구인 이유 [09:40]

- 죽음을 기억하면 외부의 기대·자존심·실패 두려움·창피함이 모두 **사라짐**
- 남는 건 **진짜 중요한 것뿐**
- *"당신은 이미 벌거벗겨져 있어요. 가슴을 따르지 않을 이유가 없습니다."*

### 췌장암 진단 경험 [10:13]

- 1년 전(2004) 췌장 종양 진단 → 의사: "불치암, 3~6개월 시한부"
- *"집에 가서 정리하세요"는 의사들의 완곡어법 — 작별 인사하라는 뜻이에요.*
- 그날 저녁 생검(조직 검사) 실시
- 결과: __매우 드문 '수술로 치료 가능한' 종류의 췌장암__
  - 검사 결과를 보며 의사들이 울었다고 아내가 전해줌
- 수술 후 완치: *"지금은 괜찮아요."*

### 죽음에 대한 철학 [11:48]

> "죽음은 우리 모두가 공유하는 종착지예요. 아무도 피해간 적 없어요."

- __**죽음은 삶의 최고 발명품**__ — 낡은 것을 쓸어내고 새것이 오게 함
- 지금 새것은 **당신들**. 하지만 언젠가 당신도 낡은 것이 되어 쓸려감

**세 가지 하지 말아야 할 것:**

1. ❌ 남의 삶을 사는 것 — 시간이 한정됨
2. ❌ __도그마(남의 생각의 결과로 사는 것)__에 갇히는 것
3. ❌ 타인의 의견 소음이 내면의 목소리를 덮게 하는 것

> **"가슴과 직관을 따를 용기를 가지세요. 그것들은 이미 당신이 진정 무엇이 되고 싶은지 알고 있어요. 나머지는 전부 부차적입니다."**

────────────────────────────

## 🌟 마무리: Stay Hungry. Stay Foolish. [13:53]

### 《Whole Earth Catalog》 [13:21]

- 잡스 세대의 바이블 — __일종의 '종이 구글'__, 구글보다 35년 앞선 아이디어·도구의 집합체
- 1960년대 말, 스튜어트 브랜드가 타자기·가위·폴라로이드 카메라로 만듦
- 역할이 다하자 **마지막 호** 발간 (1970년대 중반)
- 뒷표지 사진: 이른 아침 시골길 + 작별 메시지:

> __**"Stay Hungry. Stay Foolish."**__

*"나는 늘 그 말이 나 자신에게 해당되길 바랐어요."*

### 졸업생에게 보내는 마지막 말 [14:23]

> **"Stay Hungry. Stay Foolish. 감사합니다."**

────────────────────────────

## 💡 핵심 정리
> - 🔑 **점은 앞을 보며 연결할 수 없다** — 지금의 방황·우회가 언젠가 결정적 자산이 된다. 직감을 믿어라.
> - ❤️ **사랑하는 일을 찾아라, 절대 타협하지 마라** — 위대한 일은 그 일을 사랑할 때만 나온다.
> - 💀 **죽음을 기억하라** — 두려움·체면·남의 기대가 사라지고 진짜 중요한 것만 남는다.
> - ⚠️ **도그마(남의 생각대로 사는 것)를 경계하라** — 내면의 목소리가 타인의 소음에 묻히지 않게 하라.
> - 🌟 **Stay Hungry. Stay Foolish.** — 항상 배고프게(겸손히 갈망하며), 항상 어리석게(틀에 갇히지 않고 과감하게).
